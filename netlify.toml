[build]
  publish = "."

# Главная страница ведёт в Тигель. index.html (старое лобби) остаётся на
# месте, просто больше не открывается по умолчанию на "/".
[[redirects]]
  from = "/"
  to = "/tigel-app.html"
  status = 302
  force = true

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

# Netlify by default doesn't install a function's own package.json deps
# (netlify/functions/package.json, holding firebase-admin) — this plugin does.
[[plugins]]
  package = "@netlify/plugin-functions-install-core"
