<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Cormorant Garamond',serif;color:#c9a84c;touch-action:pan-x pan-y}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,rgba(40,20,80,.3),transparent 50%),#02010a}
canvas{position:fixed;inset:0;z-index:1;touch-action:none}
.hud{position:relative;z-index:2;text-align:center;pointer-events:none;margin-top:-30px}
.hud h1{font-family:'Cinzel Decorative',serif;font-size:16px;color:#ffd700;letter-spacing:.2em;text-shadow:0 0 30px rgba(255,215,0,.4)}
.hud .sub{font-size:8px;color:rgba(201,168,76,.35);letter-spacing:.2em;font-family:'JetBrains Mono',monospace}
.info-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:8px 16px;background:rgba(2,1,10,.85);border:1px solid rgba(201,168,76,.2);border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(201,168,76,.5);pointer-events:none;z-index:3;text-align:center;max-width:90vw}
.layer-nav{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;width:min(94vw,560px)}
.layer-link{padding:8px 12px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);border-radius:8px;color:#c9a84c;font-family:'Cinzel',serif;font-size:10px;cursor:pointer;text-decoration:none;letter-spacing:.09em;white-space:nowrap;backdrop-filter:blur(8px)}
.layer-link:hover{background:rgba(201,168,76,.15);color:#ffd700;border-color:#ffd700}
.kosha-bar{position:fixed;bottom:102px;left:50%;transform:translateX(-50%);z-index:6;display:flex;align-items:center;gap:0;background:rgba(2,1,10,.85);border:1px solid rgba(201,168,76,.18);border-radius:24px;padding:4px 6px;backdrop-filter:blur(12px)}
.kosha-dot{display:flex;align-items:center;gap:4px;padding:5px 8px;text-decoration:none;color:rgba(201,168,76,.35);font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.06em;border-radius:16px;transition:all .3s;white-space:nowrap;min-height:28px}
.kosha-dot:hover{color:rgba(201,168,76,.7);background:rgba(201,168,76,.06)}
.kosha-dot.active{color:#ffd700;background:rgba(255,215,0,.1);text-shadow:0 0 12px rgba(255,215,0,.4)}
.kosha-dot .kd-circle{width:6px;height:6px;border-radius:50%;background:rgba(201,168,76,.2);transition:all .3s;flex-shrink:0}
.kosha-dot.active .kd-circle{background:#ffd700;box-shadow:0 0 8px rgba(255,215,0,.5)}
.kosha-sep{width:12px;height:1px;background:rgba(201,168,76,.12);flex-shrink:0}
@media(max-width:480px){.kosha-dot span{display:none}.kosha-dot{padding:6px}.kosha-bar{gap:0;padding:4px 8px}}
.loka-panel{position:fixed;top:36px;left:4px;bottom:112px;width:105px;z-index:5;overflow-y:auto;padding:2px;display:flex;flex-direction:column;gap:2px;scrollbar-width:none}
.loka-panel::-webkit-scrollbar{display:none}
.loka-item{padding:3px 5px;background:rgba(2,1,10,.75);border:1px solid rgba(201,168,76,.12);border-radius:5px;cursor:pointer;font-size:7px;line-height:1.3;font-family:'JetBrains Mono',monospace;color:rgba(201,168,76,.5);transition:border-color .2s,color .2s}
.loka-item:hover,.loka-item.active{border-color:rgba(255,215,0,.5);color:#ffd700;background:rgba(201,168,76,.08)}
.loka-item .li-name{font-family:'Cinzel',serif;font-size:8px}
.loka-item .li-deity{font-size:6px;opacity:.5}
.reset-cam{position:fixed;top:40px;right:8px;z-index:10;padding:4px 10px;background:rgba(0,0,0,.6);border:1px solid rgba(201,168,76,.25);border-radius:6px;color:#c9a84c;font-family:'Cinzel',serif;font-size:8px;cursor:pointer;letter-spacing:.05em;min-height:28px}
.reset-cam:hover{border-color:#ffd700;color:#ffd700}
.lang-switch{position:fixed;top:8px;right:8px;z-index:10;display:flex;gap:4px}
.lang-switch button{padding:3px 7px;background:rgba(0,0,0,.5);border:1px solid rgba(201,168,76,.2);color:#c9a84c;font-size:8px;cursor:pointer;border-radius:4px}
</style>

<div class="hud"><h1 data-i18n="vedic.title">ВЕДИЧЕСКАЯ ВСЕЛЕННАЯ</h1><div class="sub" data-i18n="vedic.sub">14 ЛОК · БРАХМАНДА</div></div>

  <div class="kosha-sep"></div>
  <a href="mind-space.html" class="kosha-dot" title="Маномайя-коша"><div class="kd-circle"></div><span>МАНАС</span></a>
  <div class="kosha-sep"></div>
  <a href="vedic-cosmos.html" class="kosha-dot active" title="Виджнянамайя-коша"><div class="kd-circle"></div><span>ВИДЖНЯНА</span></a>
  <div class="kosha-sep"></div>

<div id="loading" style="position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:#02010a;font-family:'Cinzel',serif;color:#ffd700;font-size:14px;letter-spacing:.2em"><span data-i18n="common.loading">✦ ЗАГРУЗКА...</span></div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
document.getElementById('loading').style.display = 'none';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 30);
camera.position.set(0, 1, 8);

const root = new THREE.Group();
scene.add(root);

// Звёзды
const sg = new THREE.BufferGeometry();
const sa = new Float32Array(800*3);
for(let i=0;i<800*3;i+=3){const r=15+Math.random()*10,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);sa[i]=r*Math.sin(ph)*Math.cos(th);sa[i+1]=r*Math.sin(ph)*Math.sin(th);sa[i+2]=r*Math.cos(ph);}
sg.setAttribute('position',new THREE.BufferAttribute(sa,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:.04,transparent:true,opacity:.4})));

// ══ 14 ЛОК ══
const _lang = localStorage.getItem('awara_lang') || 'ru';
const LOKAS = [
  {id:1, name:'Сатья-лока', name_en:'Satya-loka', sanskrit:'Satya-loka', y:4.5, color:'#ffffff', radius:.55, deity:'Брахма', deity_en:'Brahma', desc:'Обитель Истины. Высший мир, где души достигают освобождения.', desc_en:'Abode of Truth. The highest world where souls attain liberation.'},
  {id:2, name:'Тапа-лока', name_en:'Tapa-loka', sanskrit:'Tapa-loka', y:3.8, color:'#e8e0ff', radius:.5, deity:'Санакади Муни', deity_en:'Sanakadi Muni', desc:'Мир аскезы. Обитель великих мудрецов и отшельников.', desc_en:'World of austerity. Abode of great sages and ascetics.'},
  {id:3, name:'Джана-лока', name_en:'Jana-loka', sanskrit:'Jana-loka', y:3.1, color:'#d0c8ff', radius:.45, deity:'Кумары', deity_en:'Kumaras', desc:'Мир божественных сыновей Брахмы. Чистое знание.', desc_en:'World of divine sons of Brahma. Pure knowledge.'},
  {id:4, name:'Махар-лока', name_en:'Mahar-loka', sanskrit:'Mahar-loka', y:2.4, color:'#b8b0ff', radius:.42, deity:'Бхригу Муни', deity_en:'Bhrigu Muni', desc:'Великий мир. Прибежище во время разрушения трёх низших миров.', desc_en:'Great world. Refuge during destruction of three lower worlds.'},
  {id:5, name:'Свар-лока', name_en:'Svar-loka', sanskrit:'Svar-loka', y:1.7, color:'#a0c8ff', radius:.48, deity:'Индра', deity_en:'Indra', desc:'Небесное царство. Рай Индры. Мир полубогов и наслаждений.', desc_en:'Heavenly kingdom. Paradise of Indra. World of demigods and pleasures.'},
  {id:6, name:'Бхувар-лока', name_en:'Bhuvar-loka', sanskrit:'Bhuvar-loka', y:1.0, color:'#88ccff', radius:.44, deity:'Сурья · Чандра', deity_en:'Surya · Chandra', desc:'Атмосферный мир. Пространство между Землёй и Солнцем. Мир сиддхов.', desc_en:'Atmospheric world. Space between Earth and Sun. World of siddhas.'},
  {id:7, name:'Бхур-лока', name_en:'Bhur-loka', sanskrit:'Bhur-loka', y:0.3, color:'#66bbff', radius:.6, deity:'Агни · Варуна', deity_en:'Agni · Varuna', desc:'ЗЕМЛЯ. Наш физический мир. Джамбудвипа. Единственное место кармического действия.', desc_en:'EARTH. Our physical world. Jambudvipa. The only place of karmic action.'},
  {id:8, name:'Атала', name_en:'Atala', sanskrit:'Atala', y:-0.5, color:'#ff9966', radius:.38, deity:'Бала', deity_en:'Bala', desc:'Первый подземный мир. Управляется сыном Майи — Балой.', desc_en:'First netherworld. Ruled by the son of Maya — Bala.'},
  {id:9, name:'Витала', name_en:'Vitala', sanskrit:'Vitala', y:-1.1, color:'#ff8844', radius:.36, deity:'Хара-Бхава', deity_en:'Hara-Bhava', desc:'Мир Шивы в форме Хатакешвары. Золотые дворцы демонов.', desc_en:'World of Shiva as Hatakeshvara. Golden palaces of demons.'},
  {id:10, name:'Сутала', name_en:'Sutala', sanskrit:'Sutala', y:-1.7, color:'#ff7733', radius:.35, deity:'Бали Махарадж', deity_en:'Bali Maharaj', desc:'Царство великого царя Бали. Чистый и процветающий мир.', desc_en:'Kingdom of great king Bali. Pure and prosperous world.'},
  {id:11, name:'Талатала', name_en:'Talatala', sanskrit:'Talatala', y:-2.3, color:'#ee6622', radius:.34, deity:'Майя Данава', deity_en:'Maya Danava', desc:'Мир архитектора демонов Майи. Мистические технологии и иллюзии.', desc_en:'World of demon architect Maya. Mystical technologies and illusions.'},
  {id:12, name:'Махатала', name_en:'Mahatala', sanskrit:'Mahatala', y:-2.9, color:'#dd5511', radius:.33, deity:'Наги', deity_en:'Nagas', desc:'Мир змеев-нагов. Глубокие пещеры, наполненные мистическими силами.', desc_en:'World of naga serpents. Deep caves filled with mystical powers.'},
  {id:13, name:'Расатала', name_en:'Rasatala', sanskrit:'Rasatala', y:-3.5, color:'#cc4400', radius:.32, deity:'Дайтьи · Данавы', deity_en:'Daityas · Danavas', desc:'Мир демонов. Противники богов, обладающие огромной силой.', desc_en:'World of demons. Adversaries of gods possessing immense power.'},
  {id:14, name:'Патала', name_en:'Patala', sanskrit:'Patala', y:-4.1, color:'#aa3300', radius:.4, deity:'Васуки · Шеша', deity_en:'Vasuki · Shesha', desc:'Нага-лока. Царство змеев. Блистающий драгоценностями мир.', desc_en:'Naga-loka. Kingdom of serpents. World glittering with jewels.'}
];
function _n(l,f){return _lang==='en'&&l[f+'_en']?l[f+'_en']:l[f];}

// Disk radii (upper lokas narrow upward, Bhur-loka widest, lower lokas narrow downward)
const DISK_R={1:.35,2:.45,3:.55,4:.7,5:.85,6:1.0,7:1.3,8:.95,9:.85,10:.75,11:.65,12:.55,13:.45,14:.38};

const lokaMeshes = [];
const lokaGlows = [];

LOKAS.forEach(l => {
  const dr=DISK_R[l.id]||l.radius;
  const diskH=l.id===7?.12:.06;

  // Диск локи
  const g=new THREE.CylinderGeometry(dr,dr,diskH,64);
  const m=new THREE.MeshStandardMaterial({color:l.color,roughness:.3,metalness:.5,transparent:true,opacity:.75,side:THREE.DoubleSide});
  const mesh=new THREE.Mesh(g,m);
  mesh.position.set(0,l.y,0);
  mesh.userData=l;
  root.add(mesh);
  lokaMeshes.push(mesh);

  // Свечение края
  const eg=new THREE.TorusGeometry(dr,.015,8,64);
  const em=new THREE.MeshBasicMaterial({color:l.color,transparent:true,opacity:.35,depthWrite:false});
  const edge=new THREE.Mesh(eg,em);
  edge.rotation.x=Math.PI/2;
  edge.position.set(0,l.y,0);
  root.add(edge);

  // Метка-спрайт
  const c=document.createElement('canvas');c.width=200;c.height=50;
  const cx=c.getContext('2d');
  cx.fillStyle=l.color;cx.font='bold 13px Cinzel,serif';cx.textAlign='center';
  cx.fillText(_n(l,'name'),100,22);
  cx.fillStyle='rgba(255,255,255,.4)';cx.font='8px JetBrains Mono,monospace';
  cx.fillText(_n(l,'deity')||'',100,36);
  const tex=new THREE.CanvasTexture(c);tex.minFilter=THREE.LinearFilter;
  const sprite=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false,depthWrite:false}));
  sprite.position.set(dr+.3,l.y,0);
  sprite.scale.set(.8,.2,1);
  root.add(sprite);
});

// Гора Меру (центральная ось)
const meruGeo=new THREE.ConeGeometry(.12,4.5,12);
const meruMat=new THREE.MeshStandardMaterial({color:0xffd700,roughness:.3,metalness:.8,transparent:true,opacity:.25});
const meru=new THREE.Mesh(meruGeo,meruMat);
meru.position.set(0,2.5,0);
root.add(meru);

// Океаны Бхур-локи (концентрические кольца)
for(let i=0;i<4;i++){
  const r1=.25+i*.25,r2=r1+.15;
  const rg=new THREE.RingGeometry(r1,r2,64);
  const rm=new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(.55-.03*i,.6,.5),transparent:true,opacity:.15,side:THREE.DoubleSide,depthWrite:false});
  const ring=new THREE.Mesh(rg,rm);
  ring.rotation.x=-Math.PI/2;
  ring.position.set(0,.36,0);
  root.add(ring);
}

// ══ РА В ЦЕНТРЕ (как в глобусе) ══
const raGeo = new THREE.SphereGeometry(.4, 32, 32);
const raMat = new THREE.ShaderMaterial({
  vertexShader:'varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',
  fragmentShader:'varying vec3 vN;void main(){float i=pow(.65-dot(vN,vec3(0,0,1)),2.);gl_FragColor=vec4(1.,.92,.4,1.)*i*1.8+vec4(1.,.84,0.,1.)*.4;}',
  transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false
});
const raCore = new THREE.Mesh(raGeo,raMat);
scene.add(raCore);

const raHalo = new THREE.Mesh(new THREE.SphereGeometry(.7,32,32), new THREE.MeshBasicMaterial({color:0xffd700,transparent:true,opacity:.15,depthWrite:false,depthTest:false}));
scene.add(raHalo);

// Кольца РА
const raRingGeo = new THREE.TorusGeometry(.5,.012,16,100);
const raRing1 = new THREE.Mesh(raRingGeo,new THREE.MeshBasicMaterial({color:0xffd700,transparent:true,opacity:.6,depthTest:false}));
raRing1.rotation.x=Math.PI/2; scene.add(raRing1);
const raRing2 = new THREE.Mesh(raRingGeo,new THREE.MeshBasicMaterial({color:0xffd700,transparent:true,opacity:.4,depthTest:false}));
raRing2.rotation.x=Math.PI/3;raRing2.rotation.y=Math.PI/4; scene.add(raRing2);

// ══ ОБОЛОЧКА ЯЙЦА ══
const eggGeo = new THREE.SphereGeometry(1, 64, 48);
eggGeo.scale(1, 2.8, 1);
const eggMat = new THREE.MeshStandardMaterial({roughness:.4, metalness:.7, color:0xffd700, transparent:true, opacity:.08, depthWrite:false});
const eggShell = new THREE.Mesh(eggGeo, eggMat);
eggShell.position.y = 0.2;
root.add(eggShell);

// Меридианы яйца
const merGroup = new THREE.Group();
const merMatLine = new THREE.LineBasicMaterial({color:0xffd700, transparent:true, opacity:.15, depthWrite:false});
for(let lng=0;lng<360;lng+=36){
  const pts=[];
  for(let lat=-90;lat<=90;lat+=3){
    const phi=(90-lat)*Math.PI/180, th=lng*Math.PI/180;
    const r=1;let x=-r*Math.sin(phi)*Math.cos(th), y=r*Math.cos(phi)*2.8+.2, z=r*Math.sin(phi)*Math.sin(th);
    pts.push(new THREE.Vector3(x,y,z));
  }
  merGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),merMatLine));
}
root.add(merGroup);

// Ось мира (Меру)
const axisGeo = new THREE.CylinderGeometry(.02,.02,9,8);
const axisMat = new THREE.MeshBasicMaterial({color:0xffd700, transparent:true, opacity:.3});
const axis = new THREE.Mesh(axisGeo, axisMat);
axis.position.y = 0.2;
root.add(axis);

// ══ СВЕТ ══
scene.add(new THREE.AmbientLight(0x332244, 3));
const sun = new THREE.DirectionalLight(0xffeedd, 4);
sun.position.set(5,5,5);
scene.add(sun);

// ══ УПРАВЛЕНИЕ ══
let rotY=0, rotX=.2, auto=true, drag=false, px=0, py=0;
canvas.addEventListener('pointerdown',e=>{drag=true;auto=false;px=e.clientX;py=e.clientY;});
window.addEventListener('pointermove',e=>{if(!drag)return;rotY+=(e.clientX-px)*.004;rotX+=(e.clientY-py)*.004;rotX=Math.max(-.8,Math.min(.8,rotX));px=e.clientX;py=e.clientY;});
window.addEventListener('pointerup',()=>{drag=false;setTimeout(()=>auto=true,3000);});

// Zoom (wheel + pinch)
let camZ=8, camTgtY=1;
const CAM_MIN=4, CAM_MAX=16;
canvas.addEventListener('wheel',e=>{e.preventDefault();camZ+=e.deltaY*.01;camZ=Math.max(CAM_MIN,Math.min(CAM_MAX,camZ));},{passive:false});
let pinchDist=0;
canvas.addEventListener('touchstart',e=>{if(e.touches.length===2){pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}},{passive:true});
canvas.addEventListener('touchmove',e=>{if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);camZ+=(pinchDist-d)*.03;camZ=Math.max(CAM_MIN,Math.min(CAM_MAX,camZ));pinchDist=d;}},{passive:true});

// Reset
document.getElementById('reset-cam').addEventListener('click',()=>{camTgtY=1;camZ=8;auto=true;});

// Ховер
const raycaster = new THREE.Raycaster();
canvas.addEventListener('pointermove',e=>{
  if(drag)return;
  const rect=renderer.domElement.getBoundingClientRect();
  const mx=((e.clientX-rect.left)/rect.width)*2-1, my=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(new THREE.Vector2(mx,my),camera);
  const hits=raycaster.intersectObjects(lokaMeshes);
  const bar=document.getElementById('info-bar');
  if(hits.length>0){
    const l=hits[0].object.userData;
    bar.textContent=_n(l,'name')+' ('+l.sanskrit+') · '+_n(l,'deity')+' — '+_n(l,'desc');
    bar.style.color=l.color;
  }else{
    bar.textContent=window.t?window.t('vedic.hint'):'🌌 вращай · наведи на слой';
    bar.style.color='rgba(201,168,76,.5)';
  }
});

// Клик по сфере → модальное окно
canvas.addEventListener('click',e=>{
  if(drag)return;
  const rect=renderer.domElement.getBoundingClientRect();
  const mx=((e.clientX-rect.left)/rect.width)*2-1,my=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(new THREE.Vector2(mx,my),camera);
  const hits=raycaster.intersectObjects(lokaMeshes);
  if(hits.length>0) showLokaModal(hits[0].object.userData);
});

function showLokaModal(l){
  auto=false;
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;z-index:60;background:rgba(2,1,10,.9);display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)';
  ov.onclick=function(e){if(e.target===ov||e.target.classList.contains('_mc')){ov.remove();setTimeout(()=>auto=true,2000);}};
  ov.innerHTML='<div style="background:linear-gradient(135deg,rgba(18,14,30,.95),rgba(8,5,18,.95));border:1px solid rgba(255,215,0,.4);border-radius:16px;padding:24px;max-width:340px;width:100%;text-align:center;max-height:80vh;overflow-y:auto" onclick="event.stopPropagation()">'+
    '<div style="width:44px;height:44px;border-radius:50%;background:'+l.color+';margin:0 auto 12px;opacity:.7;box-shadow:0 0 24px '+l.color+'"></div>'+
    '<div style="font-family:Cinzel Decorative,serif;font-size:16px;color:#ffd700;letter-spacing:.1em;margin-bottom:4px">'+_n(l,'name')+'</div>'+
    '<div style="font-size:10px;color:rgba(201,168,76,.35);font-family:JetBrains Mono,monospace;margin-bottom:8px">'+l.sanskrit+' · #'+l.id+' / 14</div>'+
    '<div style="font-size:11px;color:'+l.color+';margin-bottom:12px;font-family:Cinzel,serif">'+_n(l,'deity')+'</div>'+
    '<div style="font-size:12px;color:rgba(201,168,76,.7);line-height:1.6;margin-bottom:16px">'+_n(l,'desc')+'</div>'+
    '<button class="_mc" style="padding:8px 24px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);border-radius:8px;color:#c9a84c;font-family:Cinzel,serif;font-size:10px;cursor:pointer;letter-spacing:.1em">'+(_lang==='en'?'CLOSE':'ЗАКРЫТЬ')+'</button>'+
    '</div>';
  document.body.appendChild(ov);
}

// Инфо-панель 14 лок
const lokaPanel=document.getElementById('loka-panel');
lokaPanel.innerHTML=LOKAS.map(l=>
  '<div class="loka-item" data-lid="'+l.id+'">'+
  '<div class="li-name" style="color:'+l.color+'">'+_n(l,'name')+'</div>'+
  '<div class="li-deity">'+_n(l,'deity')+'</div>'+
  '</div>'
).join('');
lokaPanel.addEventListener('click',e=>{
  const item=e.target.closest('.loka-item');
  if(!item)return;
  const loka=LOKAS.find(l=>l.id===parseInt(item.dataset.lid));
  if(!loka)return;
  camTgtY=loka.y;camZ=6;auto=false;
  setTimeout(()=>auto=true,5000);
  lokaPanel.querySelectorAll('.loka-item').forEach(i=>i.classList.remove('active'));
  item.classList.add('active');
});

let t=0;
function animate(ts){requestAnimationFrame(animate);t=ts*.001;
  if(auto)rotY+=.003;
  root.rotation.y=rotY;root.rotation.x=rotX;
  // Camera fly + zoom
  camera.position.y+=(camTgtY-camera.position.y)*.05;
  camera.position.z+=(camZ-camera.position.z)*.05;
  // Пульсация РА (1.0 ↔ 1.08)
  const pulse=1.04+Math.sin(t*2)*.04;
  raCore.scale.setScalar(pulse);
  raHalo.scale.setScalar(pulse);
  raRing1.rotation.z+=.006;raRing2.rotation.z-=.004;
  renderer.render(scene,camera);
}
animate(0);

window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();
});
</script>

<script type="module">
import { translatePage, setLang, getLang } from './js/i18n.js';
window.switchLang = function(lang) {
  setLang(lang);
  translatePage();
  document.querySelectorAll('#lang-ru,#lang-en').forEach(function(b){
    b.style.borderColor = b.textContent === lang.toUpperCase() ? '#ffd700' : 'rgba(201,168,76,.2)';
    b.style.color = b.textContent === lang.toUpperCase() ? '#ffd700' : '#c9a84c';
  });
};
document.addEventListener('DOMContentLoaded', function() {
  translatePage();
  var cur = getLang();
  if (window.switchLang) window.switchLang(cur);
});
