<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sources of Grace — AWARA</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cormorant Garamond', serif;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(10, 6, 30, 0.9), transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(80, 40, 160, 0.15), transparent 45%),
        radial-gradient(ellipse at 20% 80%, rgba(40, 100, 200, 0.12), transparent 45%),
        linear-gradient(180deg, #020810 0%, #050119 45%, #030618 100%),
        #000;
      color: #dcd2be;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,215,0,0.6), transparent),
        radial-gradient(1px 1px at 30% 50%, rgba(255,215,0,0.4), transparent),
        radial-gradient(1.5px 1.5px at 50% 15%, rgba(255,248,214,0.5), transparent),
        radial-gradient(1px 1px at 70% 40%, rgba(201,168,76,0.5), transparent),
        radial-gradient(1px 1px at 90% 70%, rgba(255,215,0,0.3), transparent),
        radial-gradient(1.5px 1.5px at 15% 85%, rgba(255,248,214,0.4), transparent),
        radial-gradient(1px 1px at 45% 75%, rgba(201,168,76,0.4), transparent),
        radial-gradient(1px 1px at 80% 10%, rgba(255,215,0,0.5), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .milost-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px 60px;
      position: relative;
      z-index: 1;
    }

    .milost-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 16px 20px;
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 12px;
      background: rgba(10,6,30,0.6);
    }

    .milost-back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #c9a84c;
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      transition: color 0.3s;
    }
    .milost-back:hover { color: #ffd700; }

    .milost-back-arrow {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 8px;
      font-size: 16px;
    }

    .milost-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(16px, 4vw, 22px);
      color: #c9a84c;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .milost-subtitle {
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: rgba(255,248,214,0.5);
      margin-bottom: 20px;
      letter-spacing: 0.04em;
    }

    .source-card {
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 12px;
      background: rgba(10,6,30,0.6);
      padding: 20px;
      margin-bottom: 14px;
      transition: border-color 0.3s;
    }
    .source-card:hover {
      border-color: rgba(201,168,76,0.45);
    }
    .source-card.breached {
      border-color: rgba(255,215,0,0.5);
      background: rgba(20,12,40,0.7);
    }

    .source-ray {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(201,168,76,0.6);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .source-name {
      font-family: 'Cinzel', serif;
      font-size: clamp(15px, 3.5vw, 18px);
      color: #c9a84c;
      margin-bottom: 8px;
    }

    .source-desc {
      font-size: 14px;
      color: rgba(255,248,214,0.65);
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .source-stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .source-stat {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(255,248,214,0.5);
    }
    .source-stat b {
      color: #ffd700;
    }

    .progress-wrap {
      margin-bottom: 6px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(255,248,214,0.5);
      margin-bottom: 4px;
    }

    .progress-bar {
      height: 6px;
      background: rgba(201,168,76,0.12);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #c9a84c, #ffd700);
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    .progress-fill.full {
      background: linear-gradient(90deg, #ffd700, #ffe680);
    }

    .source-status {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .source-status.active {
      color: #c9a84c;
    }
    .source-status.breached-label {
      color: #ffd700;
    }
    .source-status.inactive {
      color: rgba(255,248,214,0.35);
    }

    .macrocosm-msg {
      margin-top: 12px;
      padding: 14px 16px;
      border-left: 2px solid rgba(255,215,0,0.5);
      background: rgba(255,215,0,0.04);
      border-radius: 0 8px 8px 0;
      font-style: italic;
      font-size: 13px;
      color: rgba(255,248,214,0.8);
      line-height: 1.6;
      white-space: pre-line;
    }

    .milost-loading {
      text-align: center;
      padding: 40px 0;
      font-family: 'Cinzel', serif;
      color: rgba(201,168,76,0.5);
      font-size: 14px;
      letter-spacing: 0.1em;
    }

    @media (max-width: 375px) {
      .milost-container { padding: 16px 10px 40px; }
      .source-card { padding: 14px; }
      .source-stats { gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="milost-container">
    <div class="milost-header">
      <a href="index.html" class="milost-back">
        <span class="milost-back-arrow">&larr;</span>
      </a>
      <span class="milost-title" data-i18n="milost.title" data-i18n="milost.title">Источники Милости</span>
      <span></span>
    </div>
    <p class="milost-subtitle" data-i18n="milost.subtitle">7 Лучей Благодати -- от Золотого Века до Великого Цикла</p>

    <div id="sources-list">
      <div class="milost-loading" data-i18n="milost.loading">Загрузка источников...</div>
    </div>
  </div>

  <script type="module">
    import { t, initLang, applyTranslations } from './js/i18n.js';
    import { getCurrentSource } from './js/milost-module.js';
    initLang();

    const RAY_NAMES = [
      t('milost.ray.1'),
      t('milost.ray.2'),
      t('milost.ray.3'),
      t('milost.ray.4'),
      t('milost.ray.5'),
      t('milost.ray.6'),
      t('milost.ray.7')
    ];

    function getResonancePoints() {
      try {
        const state = JSON.parse(localStorage.getItem('awara_player_state') || '{}');
        return state.resonance || 0;
      } catch { return 0; }
    }

    function getPlayerRay() {
      try {
        const state = JSON.parse(localStorage.getItem('awara_player_state') || '{}');
        return state.ray || 4;
      } catch { return 4; }
    }

    async function renderSources() {
      const container = document.getElementById('sources-list');
      const resonance = getResonancePoints();
      const playerRay = getPlayerRay();

      const sources = [];
      for (let r = 1; r <= 7; r++) {
        const src = await getCurrentSource(r);
        if (src) sources.push(src);
      }

      if (sources.length === 0) {
        container.innerHTML = '<div class="milost-loading">' + t('milost.load.error') + '</div>';
        return;
      }

      container.innerHTML = '';

      for (const src of sources) {
        const pct = Math.min(100, Math.round((resonance / src.veil_threshold) * 100));
        const breached = resonance >= src.veil_threshold;
        const isPlayerRay = src.ray === playerRay;

        const card = document.createElement('div');
        card.className = 'source-card' + (breached ? ' breached' : '');

        let statusClass = 'inactive';
        let statusText = t('milost.status.inactive');
        if (breached) {
          statusClass = 'breached-label';
          statusText = t('milost.status.veil');
        } else if (isPlayerRay) {
          statusClass = 'active';
          statusText = t('milost.status.active');
        }

        let html = '';
        html += '<div class="source-ray">' + RAY_NAMES[src.ray - 1] + '</div>';
        html += '<div class="source-name">' + t('milost.source.' + src.ray + '.name') + '</div>';
        html += '<div class="source-desc">' + t('milost.source.' + src.ray + '.desc') + '</div>';
        html += '<div class="source-stats">';
        html += '  <span class="source-stat">' + t('milost.threshold') + ' <b>' + src.veil_threshold + '</b></span>';
        html += '  <span class="source-stat">' + t('milost.multiplier') + ' <b>x' + src.multiplier + '</b></span>';
        html += '</div>';
        html += '<div class="progress-wrap">';
        html += '  <div class="progress-label">';
        html += '    <span>' + t('milost.resonance') + '</span>';
        html += '    <span>' + resonance + ' / ' + src.veil_threshold + '</span>';
        html += '  </div>';
        html += '  <div class="progress-bar">';
        html += '    <div class="progress-fill' + (breached ? ' full' : '') + '" style="width:' + pct + '%"></div>';
        html += '  </div>';
        html += '</div>';
        html += '<div class="source-status ' + statusClass + '">' + statusText + '</div>';

        if (breached) {
          html += '<div class="macrocosm-msg">' + t('milost.source.' + src.ray + '.macro') + '</div>';
        }

        card.innerHTML = html;
        container.appendChild(card);
      }
    }

    renderSources();
        applyTranslations();
  </script>

<!-- Подсказки (M-006) -->
<button class="hint-btn" title="Подсказки" data-i18n-title="app.help">?</button>
<script type="module">
import { initHints } from './js/hints-module.js';
initHints('milost');
</script>

<!-- M-033: RU/EN переключатель -->
<div style="position:fixed;top:8px;right:8px;z-index:100;display:flex;gap:4px">
  <button id="lang-ru" onclick="localStorage.setItem('awara_lang','ru');if(window.switchLang)window.switchLang('ru');else location.reload()" style="min-width:36px;min-height:36px;padding:4px 8px;background:rgba(0,0,0,.5);border:1px solid rgba(201,168,76,.2);color:#c9a84c;font-size:9px;cursor:pointer;border-radius:6px;font-family:'Cinzel',serif;backdrop-filter:blur(8px)">RU</button>
  <button id="lang-en" onclick="localStorage.setItem('awara_lang','en');if(window.switchLang)window.switchLang('en');else location.reload()" style="min-width:36px;min-height:36px;padding:4px 8px;background:rgba(0,0,0,.5);border:1px solid rgba(201,168,76,.2);color:#c9a84c;font-size:9px;cursor:pointer;border-radius:6px;font-family:'Cinzel',serif;backdrop-filter:blur(8px)">EN</button>
</div>

<script type="module">
import { translatePage, setLang, getLang, createLangSwitcher } from './js/i18n.js';
window.switchLang = function(lang) {
  setLang(lang);
  translatePage();
  createLangSwitcher();
  document.querySelectorAll('#lang-ru,#lang-en').forEach(function(b){
    b.style.borderColor = b.textContent === lang.toUpperCase() ? '#ffd700' : 'rgba(201,168,76,.2)';
    b.style.color = b.textContent === lang.toUpperCase() ? '#ffd700' : '#c9a84c';
  });
};
document.addEventListener('DOMContentLoaded', function() {
  translatePage();
  createLangSwitcher();
  var cur = getLang();
  if (window.switchLang) window.switchLang(cur);
});
</script>
</body>
</html>
