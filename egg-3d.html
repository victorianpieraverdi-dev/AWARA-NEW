<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#02010a">
<title>AWARA · Золотое Яйцо 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Cormorant Garamond',serif;color:#c9a84c;touch-action:pan-x pan-y}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,rgba(40,20,80,.3),transparent 50%),radial-gradient(ellipse at 80% 70%,rgba(201,168,76,.06),transparent 50%),#02010a}
canvas{position:fixed;inset:0;z-index:1;touch-action:pan-x pan-y}
.hud{position:relative;z-index:2;text-align:center;pointer-events:none;margin-top:-20px}
.hud h1{font-family:'Cinzel Decorative',serif;font-size:18px;color:#ffd700;letter-spacing:.2em;text-shadow:0 0 30px rgba(255,215,0,.4);margin-bottom:4px}
.hud .sub{font-size:9px;color:rgba(201,168,76,.4);letter-spacing:.15em;font-family:'JetBrains Mono',monospace}
.hint{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:3;font-size:9px;color:rgba(201,168,76,.3);font-family:'JetBrains Mono',monospace;letter-spacing:.1em;pointer-events:none}
.back-btn{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:5;padding:8px 20px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);border-radius:8px;color:#c9a84c;font-family:'Cinzel',serif;font-size:10px;cursor:pointer;text-decoration:none;letter-spacing:.1em}
.back-btn:hover{background:rgba(201,168,76,.15);color:#ffd700}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud"><h1 data-i18n="egg3d.title">ЗОЛОТОЕ ЯЙЦО</h1><div class="sub" data-i18n="egg3d.sub">ХИРАНЬЯГАРБХА · 4 СЛОЯ</div></div>
<div class="hint" data-i18n="egg3d.hint">вращай · касайся</div>
<a href="index.html" class="back-btn" data-i18n="common.back.lobby">← ЛОББИ</a>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.157.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias: true, alpha: true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 20);
camera.position.set(0, 0.3, 4.5);

// Звёзды
const starsGeo = new THREE.BufferGeometry();
const arr = new Float32Array(600*3);
for(let i=0;i<600*3;i+=3){const r=10+Math.random()*8,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);arr[i]=r*Math.sin(ph)*Math.cos(th);arr[i+1]=r*Math.sin(ph)*Math.sin(th);arr[i+2]=r*Math.cos(ph);}
starsGeo.setAttribute('position',new THREE.BufferAttribute(arr,3));
scene.add(new THREE.Points(starsGeo,new THREE.PointsMaterial({color:0xffffff,size:.03,transparent:true,opacity:.5})));

const eggGroup = new THREE.Group();
scene.add(eggGroup);

function eggGeo(scaleMult) {
  const g = new THREE.SphereGeometry(1, 64, 48);
  g.scale(1, 1.35 * scaleMult, 0.75 * scaleMult);
  return g;
}

// ══ СЛОЙ 4 (внешний) — прозрачная золотая скорлупа ══
const shellGeo = eggGeo(1.05);
const shellMat = new THREE.MeshStandardMaterial({
  roughness: 0.3, metalness: 0.7, color: 0xffd700,
  transparent: true, opacity: 0.2, depthWrite: false
});
const shell = new THREE.Mesh(shellGeo, shellMat);
eggGroup.add(shell);

// Меридианы на внешней скорлупе
const merGroup = new THREE.Group();
const merMat = new THREE.LineBasicMaterial({color:0xffd700, transparent:true, opacity:.25, depthWrite:false});
for(let lng=0;lng<360;lng+=30){
  const pts=[];
  for(let lat=-90;lat<=90;lat+=2){
    const phi=(90-lat)*Math.PI/180, th=lng*Math.PI/180, r=1.05;
    pts.push(new THREE.Vector3(-r*Math.sin(phi)*Math.cos(th),r*Math.cos(phi)*1.35,r*Math.sin(phi)*Math.sin(th)*.75));
  }
  merGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),merMat));
}
// Экватор
const eqPts=[];
for(let lng=0;lng<=360;lng+=2){
  const th=lng*Math.PI/180;
  eqPts.push(new THREE.Vector3(-Math.sin(Math.PI/2)*Math.cos(th),0,Math.sin(Math.PI/2)*Math.sin(th)*.75*1.05));
}
merGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(eqPts),new THREE.LineBasicMaterial({color:0xffd700,transparent:true,opacity:.4,depthWrite:false})));
eggGroup.add(merGroup);

// ══ СЛОЙ 3 — сакральная геометрия (средний) ══
const geoLayer = eggGeo(0.8);
const geoMat = new THREE.MeshStandardMaterial({
  roughness: 0.2, metalness: 0.8, color: 0xc9a84c,
  transparent: true, opacity: 0.15, depthWrite: false
});
eggGroup.add(new THREE.Mesh(geoLayer, geoMat));

// Кольца на среднем слое
const ringGeo3 = new THREE.TorusGeometry(0.6, 0.003, 8, 100);
const ring3a = new THREE.Mesh(ringGeo3, new THREE.MeshBasicMaterial({color:0xffd700, transparent:true, opacity:.3, depthWrite:false}));
ring3a.rotation.x = Math.PI/2; ring3a.scale.set(1,1.35,0.75);
eggGroup.add(ring3a);
const ring3b = new THREE.Mesh(ringGeo3, new THREE.MeshBasicMaterial({color:0xffd700, transparent:true, opacity:.2, depthWrite:false}));
ring3b.rotation.x = Math.PI/3; ring3b.rotation.y = Math.PI/4; ring3b.scale.set(1,1.35,0.75);
eggGroup.add(ring3b);

// ══ СЛОЙ 2 — внутренняя геометрия ══
const innerGeo = eggGeo(0.5);
const innerMat = new THREE.MeshStandardMaterial({
  roughness: 0.15, metalness: 0.9, color: 0xffaa00,
  transparent: true, opacity: 0.12, depthWrite: false
});
eggGroup.add(new THREE.Mesh(innerGeo, innerMat));

// Кольца на внутреннем слое
const ringGeo2 = new THREE.TorusGeometry(0.3, 0.004, 8, 64);
const ring2 = new THREE.Mesh(ringGeo2, new THREE.MeshBasicMaterial({color:0xffcc00, transparent:true, opacity:.4, depthWrite:false}));
ring2.rotation.x = Math.PI/2; ring2.scale.set(1,1.35,0.75);
eggGroup.add(ring2);
const ring2b = new THREE.Mesh(ringGeo2, new THREE.MeshBasicMaterial({color:0xffaa00, transparent:true, opacity:.25, depthWrite:false}));
ring2b.rotation.x = Math.PI/2.5; ring2b.rotation.y = Math.PI/3; ring2b.scale.set(1,1.35,0.75);
eggGroup.add(ring2b);

// ══ СЛОЙ 1 — ядро (около РА) ══
const coreGeo = eggGeo(0.25);
const coreMat = new THREE.ShaderMaterial({
  vertexShader:'varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',
  fragmentShader:'varying vec3 vN;void main(){float i=pow(.55-dot(vN,vec3(0,0,1)),3.);gl_FragColor=vec4(1.,.85,.15,1.)*i*1.3+vec4(1.,.7,.1,1.)*.15;}',
  transparent:true, blending:THREE.AdditiveBlending, depthWrite:false
});
eggGroup.add(new THREE.Mesh(coreGeo, coreMat));

// ══ 4 МЕТКИ-КВАДРАНТА ══
function createLabel(text, lat, lng, colorHex) {
  const c=document.createElement('canvas');c.width=128;c.height=64;
  const cx=c.getContext('2d');
  cx.fillStyle='#'+colorHex.toString(16).padStart(6,'0');
  cx.font='bold 14px Cinzel,serif';cx.textAlign='center';
  cx.fillText(text,64,24);
  cx.fillStyle='rgba(255,255,255,.25)';
  cx.font='8px JetBrains Mono,monospace';
  const subs={ИГРА:'практика',ХРОНИКА:'путь',ОБМЕН:'энергия',ОБЩЕНИЕ:'связь'};
  cx.fillText(subs[text]||'',64,36);
  const tex=new THREE.CanvasTexture(c);tex.minFilter=THREE.LinearFilter;
  const sprite=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false,depthWrite:false}));
  const phi=(90-lat)*Math.PI/180, th=lng*Math.PI/180, r=1.12;
  sprite.position.set(-r*Math.sin(phi)*Math.cos(th),r*Math.cos(phi)*1.35,r*Math.sin(phi)*Math.sin(th)*.75);
  sprite.scale.set(.35,.175,1);
  return sprite;
}
const quadrants = [
  {label:'ИГРА', lat:20, lng:0, color:0xffd700},
  {label:'ХРОНИКА', lat:20, lng:180, color:0xc9a84c},
  {label:'ОБМЕН', lat:-20, lng:90, color:0xffb832},
  {label:'ОБЩЕНИЕ', lat:-20, lng:-90, color:0x88ccff},
];
quadrants.forEach(q=>eggGroup.add(createLabel(q.label,q.lat,q.lng,q.color)));
// Метки-точки
quadrants.forEach(q=>{
  const phi=(90-q.lat)*Math.PI/180, th=q.lng*Math.PI/180, r=1.08;
  const dot=new THREE.Mesh(new THREE.SphereGeometry(.025,8,8),new THREE.MeshBasicMaterial({color:q.color}));
  dot.position.set(-r*Math.sin(phi)*Math.cos(th),r*Math.cos(phi)*1.35,r*Math.sin(phi)*Math.sin(th)*.75);
  eggGroup.add(dot);
  const glow=new THREE.Mesh(new THREE.SphereGeometry(.05,8,8),new THREE.MeshBasicMaterial({color:q.color,transparent:true,opacity:.3,depthWrite:false}));
  glow.position.copy(dot.position); eggGroup.add(glow);
});

// ══ РА В ЦЕНТРЕ ══
const raGroup = new THREE.Group();
const raGeo = new THREE.SphereGeometry(.15,32,32);
const raMat = new THREE.ShaderMaterial({
  vertexShader:'varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',
  fragmentShader:'varying vec3 vN;void main(){float i=pow(.55-dot(vN,vec3(0,0,1)),2.);gl_FragColor=vec4(1.,.92,.2,1.)*i*3.+vec4(1.,.84,0.,1.)*.5;}',
  transparent:true, blending:THREE.AdditiveBlending, depthWrite:false
});
window._raCore = new THREE.Mesh(raGeo,raMat); raGroup.add(window._raCore);
// Гало РА
const haloGeo = new THREE.SphereGeometry(.3,32,32);
window._raHalo = new THREE.Mesh(haloGeo, new THREE.MeshBasicMaterial({color:0xffd700,transparent:true,opacity:.15,depthWrite:false}));
raGroup.add(window._raHalo);
// Кольца РА
const raRingGeo = new THREE.TorusGeometry(.22,.006,16,80);
window._raRing1 = new THREE.Mesh(raRingGeo,new THREE.MeshBasicMaterial({color:0xffd700,transparent:true,opacity:.6}));
window._raRing1.rotation.x=Math.PI/2; raGroup.add(window._raRing1);
window._raRing2 = new THREE.Mesh(raRingGeo,new THREE.MeshBasicMaterial({color:0xffd700,transparent:true,opacity:.35}));
window._raRing2.rotation.x=Math.PI/3;window._raRing2.rotation.y=Math.PI/4; raGroup.add(window._raRing2);
scene.add(raGroup);

// Свет
scene.add(new THREE.AmbientLight(0x332211,3));
const sun=new THREE.DirectionalLight(0xffeedd,4);sun.position.set(5,3,5);scene.add(sun);

// ══ УПРАВЛЕНИЕ ══
let rotY=0,rotX=.25,autoRotate=true,isDragging=false,prevX=0,prevY=0;
canvas.addEventListener('pointerdown',e=>{isDragging=true;autoRotate=false;prevX=e.clientX;prevY=e.clientY;});
window.addEventListener('pointermove',e=>{if(!isDragging)return;rotY+=(e.clientX-prevX)*.005;rotX+=(e.clientY-prevY)*.005;rotX=Math.max(-1,Math.min(1,rotX));prevX=e.clientX;prevY=e.clientY;});
window.addEventListener('pointerup',()=>{isDragging=false;setTimeout(()=>autoRotate=true,3000);});

let at=0;
function animate(ts){requestAnimationFrame(animate);at=ts*.001;
  if(autoRotate)rotY+=.003;
  eggGroup.rotation.y=rotY;eggGroup.rotation.x=rotX;
  const pulse=1+Math.sin(at*2)*.08;
  if(window._raCore)window._raCore.scale.setScalar(pulse);
  if(window._raHalo)window._raHalo.scale.setScalar(pulse*1.05);
  if(window._raRing1){window._raRing1.rotation.z+=.006;window._raRing1.scale.setScalar(1+Math.sin(at*1.5)*.04);}
  if(window._raRing2)window._raRing2.rotation.z-=.004;
  ring3a.rotation.z+=.002;ring3b.rotation.z-=.0015;
  ring2.rotation.z+=.004;ring2b.rotation.z-=.003;
  renderer.render(scene,camera);
}
animate(0);

window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();
});
</script>
<script type="module">
  import { applyTranslations } from './js/i18n.js';
    applyTranslations();
</script>
<!-- M-033: RU/EN переключатель -->
<div style="position:fixed;top:8px;right:8px;z-index:100;display:flex;gap:4px">
  <button id="lang-ru" onclick="localStorage.setItem('awara_lang','ru');if(window.switchLang)window.switchLang('ru');else location.reload()" style="min-width:36px;min-height:36px;padding:4px 8px;background:rgba(0,0,0,.5);border:1px solid rgba(201,168,76,.2);color:#c9a84c;font-size:9px;cursor:pointer;border-radius:6px;font-family:'Cinzel',serif;backdrop-filter:blur(8px)">RU</button>
  <button id="lang-en" onclick="localStorage.setItem('awara_lang','en');if(window.switchLang)window.switchLang('en');else location.reload()" style="min-width:36px;min-height:36px;padding:4px 8px;background:rgba(0,0,0,.5);border:1px solid rgba(201,168,76,.2);color:#c9a84c;font-size:9px;cursor:pointer;border-radius:6px;font-family:'Cinzel',serif;backdrop-filter:blur(8px)">EN</button>
</div>

<script type="module">
import { translatePage, setLang, getLang } from './js/i18n.js';
window.switchLang = function(lang) {
  setLang(lang);
  translatePage();
  document.querySelectorAll('#lang-ru,#lang-en').forEach(function(b){
    b.style.borderColor = b.textContent === lang.toUpperCase() ? '#ffd700' : 'rgba(201,168,76,.2)';
    b.style.color = b.textContent === lang.toUpperCase() ? '#ffd700' : '#c9a84c';
  });
};
document.addEventListener('DOMContentLoaded', function() {
  translatePage();
  var cur = getLang();
  if (window.switchLang) window.switchLang(cur);
});
</script>
</body>
</html>
