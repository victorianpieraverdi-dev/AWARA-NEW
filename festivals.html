  starsArr[i] = r * Math.sin(ph) * Math.cos(th);
  starsArr[i+1] = r * Math.sin(ph) * Math.sin(th);
  starsArr[i+2] = r * Math.cos(ph);
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starsArr, 3));
scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.025, transparent: true, opacity: 0.6})));

function createMeridians(r) {
  const group = new THREE.Group();
  const mat = new THREE.LineBasicMaterial({color: 0x88ccff, transparent: true, opacity: 0.12, depthWrite: false});
  for (let lng = 0; lng < 360; lng += 30) {
    const pts = [];
    for (let lat = -90; lat <= 90; lat += 4) {
      const phi = (90 - lat) * Math.PI / 180, theta = lng * Math.PI / 180;
      pts.push(new THREE.Vector3(-r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta)));
    }
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
  }
  for (let lat = -60; lat <= 60; lat += 30) {
    const pts = [], phi = (90 - lat) * Math.PI / 180;
    for (let lng2 = 0; lng2 <= 360; lng2 += 4) {
      const theta = lng2 * Math.PI / 180;
      pts.push(new THREE.Vector3(-r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta)));
    }
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
  }
  return group;
}

// ══ ДОДЕКАЭДР: рёбра между узлами (красные + синие как на референсе) ══
function dist(a, b) {
  const dlat = (a.lat - b.lat) * Math.PI / 180;
  const dlng = (a.lng - b.lng) * Math.PI / 180;
  const alat = a.lat * Math.PI / 180;
  const blat = b.lat * Math.PI / 180;
  return Math.acos(Math.min(1, Math.sin(alat)*Math.sin(blat) + Math.cos(alat)*Math.cos(blat)*Math.cos(dlng)));
}

// Great-circle arc between two points (smooth curve on sphere)
function greatCircleArc(latA, lngA, latB, lngB, r, segments) {
  const pts = [];
  const vA = latLngToVec3(latA, lngA, r);
  const vB = latLngToVec3(latB, lngB, r);
  for (let t = 0; t <= segments; t++) {
    const f = t / segments;
    const v = vA.clone().lerp(vB, f).normalize().multiplyScalar(r);
    pts.push(v);
  }
  return pts;
}

const EDGE_THRESHOLD = 0.65;
const edgeGroup = new THREE.Group();
// Красные линии = рёбра между золотыми узлами (icosahedron network)
const edgeMatRed = new THREE.LineBasicMaterial({color: 0xdd4466, transparent: true, opacity: 0.85, depthWrite: false, linewidth: 2});
// Синие линии = рёбра между обычными узлами (dodecahedron network)
const edgeMatBlue = new THREE.LineBasicMaterial({color: 0x4488dd, transparent: true, opacity: 0.75, depthWrite: false, linewidth: 2});

const edgeSet = new Set();
for (let i = 0; i < NODES.length; i++) {
  const neighbors = [];
  for (let j = 0; j < NODES.length; j++) {
    if (i === j) continue;
    const d = dist(NODES[i], NODES[j]);
    if (d < EDGE_THRESHOLD) neighbors.push({idx: j, dist: d});
  }
  neighbors.sort((a,b) => a.dist - b.dist);
  const maxConn = NODES[i].id <= 20 ? 5 : 4;
  neighbors.slice(0, maxConn).forEach(nb => {
    const key = Math.min(i, nb.idx) + '-' + Math.max(i, nb.idx);
    if (!edgeSet.has(key)) {
      edgeSet.add(key);
      const arcPts = greatCircleArc(NODES[i].lat, NODES[i].lng, NODES[nb.idx].lat, NODES[nb.idx].lng, 1.016, 24);
      const geo = new THREE.BufferGeometry().setFromPoints(arcPts);
      const bothGold = NODES[i].gold && NODES[nb.idx].gold;
      edgeGroup.add(new THREE.Line(geo, bothGold ? edgeMatRed : edgeMatBlue));
    }
  });
}

let isDragging = false, prevX = 0, prevY = 0;

function onDown(e) {
  if (e.touches && e.touches.length === 2) { lastPinchDist = 0; wasPinching = true; return; }
  wasPinching = false;
  isDragging = true; autoRotate = false;
  const p = e.touches ? e.touches[0] : e;
  prevX = p.clientX; prevY = p.clientY;
}
function onMove(e) {
  // Pinch to zoom
  if (e.touches && e.touches.length === 2) {
    wasPinching = true; isDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (lastPinchDist > 0) {
      camDist -= (dist - lastPinchDist) * 0.01;
      camDist = Math.max(1.5, Math.min(8, camDist));
      camera.position.z = camDist;
    }
    lastPinchDist = dist;
    return;
  }
  if (wasPinching || !isDragging) return;
  const p = e.touches ? e.touches[0] : e;
  rotY += (p.clientX - prevX) * 0.005;
  rotX += (p.clientY - prevY) * 0.005;
  rotX = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, rotX));
  prevX = p.clientX; prevY = p.clientY;
}
function onUp() { isDragging = false; setTimeout(() => { autoRotate = true; }, 3000); }

// ══ ГЕОЛОКАЦИЯ + ЗОНА ИГРОКА ══
let playerMesh = null;
let playerGlow = null;
let playerBeam = null;
let zoneHighlight = null;
let zoneEdgeGroup = null;
let playerNodeId = null;

function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function findNearestNode(lat, lng) {
  let best = null, bestDist = Infinity;
  NODES.forEach(n => {
    const d = haversineKm(lat, lng, n.lat, n.lng);
    if (d < bestDist) { bestDist = d; best = n; }
  });
  return { node: best, dist: bestDist };
}

function findNeighborNodes(nodeId) {
  const node = NODES.find(n => n.id === nodeId);
  if (!node) return [];
  const neighbors = [];
  NODES.forEach(n => {
    if (n.id === nodeId) return;
    const d = dist(node, n);
    if (d < EDGE_THRESHOLD) neighbors.push(n);
  });
  neighbors.sort((a,b) => dist(node,a) - dist(node,b));
  return neighbors.slice(0, node.id <= 20 ? 5 : 4);
}

function showPlayerOnGlobe(lat, lng) {
  // Remove old player markers
  if (playerMesh) earthGroup.remove(playerMesh);
  if (playerGlow) earthGroup.remove(playerGlow);
  if (playerBeam) earthGroup.remove(playerBeam);
  if (zoneHighlight) earthGroup.remove(zoneHighlight);
  if (zoneEdgeGroup) earthGroup.remove(zoneEdgeGroup);

  const pos = latLngToVec3(lat, lng, 1.025);

  // Player marker (bright green-gold sphere)
  const pGeo = new THREE.SphereGeometry(0.04, 12, 12);
  const pMat = new THREE.MeshBasicMaterial({color: 0x44ff44});
  playerMesh = new THREE.Mesh(pGeo, pMat);
  playerMesh.position.copy(pos);
  earthGroup.add(playerMesh);
  window._festPlayerMesh = playerMesh;

  // Player glow ring
  const glowGeo = new THREE.TorusGeometry(0.07, 0.008, 8, 24);
  const glowMat = new THREE.MeshBasicMaterial({color: 0x44ff44, transparent: true, opacity: 0.6});
  playerGlow = new THREE.Mesh(glowGeo, glowMat);
  playerGlow.position.copy(pos);
  playerGlow.lookAt(new THREE.Vector3(0, 0, 0));
  earthGroup.add(playerGlow);
  window._festPlayerGlow = playerGlow;

  // Light beam from player to center
  const beamGeo = new THREE.CylinderGeometry(0.003, 0.003, 1.025, 4);
  const beamMat = new THREE.MeshBasicMaterial({color: 0x44ff44, transparent: true, opacity: 0.15});
  playerBeam = new THREE.Mesh(beamGeo, beamMat);
  playerBeam.position.copy(pos.clone().multiplyScalar(0.5));
  playerBeam.lookAt(new THREE.Vector3(0, 0, 0));
  playerBeam.rotateX(Math.PI / 2);
  earthGroup.add(playerBeam);

  // Find nearest node and highlight zone
  const { node: nearest, dist: nearDist } = findNearestNode(lat, lng);
  playerNodeId = nearest.id;
  const neighbors = findNeighborNodes(nearest.id);

  // Zone polygon (filled triangle fan from nearest node through neighbors)
  if (neighbors.length >= 2) {
    const centerPos = latLngToVec3(nearest.lat, nearest.lng, 1.018);
    const zoneFaces = [];
    const zoneVerts = [centerPos.x, centerPos.y, centerPos.z];

    for (let i = 0; i < neighbors.length; i++) {
      const np = latLngToVec3(neighbors[i].lat, neighbors[i].lng, 1.018);
      zoneVerts.push(np.x, np.y, np.z);
    }
    for (let i = 1; i <= neighbors.length; i++) {
      const next = (i % neighbors.length) + 1;
      zoneFaces.push(0, i, next);
    }

    const zoneGeo = new THREE.BufferGeometry();
    zoneGeo.setAttribute('position', new THREE.Float32BufferAttribute(zoneVerts, 3));
    zoneGeo.setIndex(zoneFaces);
    zoneGeo.computeVertexNormals();
    const zoneMat = new THREE.MeshBasicMaterial({
      color: 0x44ff44, transparent: true, opacity: 0.12,
      side: THREE.DoubleSide, depthWrite: false
    });
    zoneHighlight = new THREE.Mesh(zoneGeo, zoneMat);
    earthGroup.add(zoneHighlight);
    window._festZoneHighlight = zoneHighlight;
  }

  // Highlight zone edges
  zoneEdgeGroup = new THREE.Group();
  const zEdgeMat = new THREE.LineBasicMaterial({color: 0x44ff44, transparent: true, opacity: 0.7, depthWrite: false});
  const nearestPos = latLngToVec3(nearest.lat, nearest.lng, 1.022);
  neighbors.forEach(nb => {
    const nbPos = latLngToVec3(nb.lat, nb.lng, 1.022);
    const geo = new THREE.BufferGeometry().setFromPoints([nearestPos, nbPos]);
    zoneEdgeGroup.add(new THREE.Line(geo, zEdgeMat));
  });
  // Close the polygon
  for (let i = 0; i < neighbors.length; i++) {
    const a = latLngToVec3(neighbors[i].lat, neighbors[i].lng, 1.022);
    const b = latLngToVec3(neighbors[(i+1)%neighbors.length].lat, neighbors[(i+1)%neighbors.length].lng, 1.022);
    const geo = new THREE.BufferGeometry().setFromPoints([a, b]);
    zoneEdgeGroup.add(new THREE.Line(geo, zEdgeMat));
  }
  earthGroup.add(zoneEdgeGroup);

  // Highlight nearest node mesh
  nodeMeshes.forEach(m => {
    if (m.userData.id === nearest.id) {
      m.material.color.setHex(0x44ff44);
      m.scale.setScalar(1.5);
    }
  });

  // Update UI
  const zoneInfo = document.getElementById('geo-zone-info');
  zoneInfo.classList.add('show');
  document.getElementById('zone-name').textContent = nName(nearest);
  document.getElementById('zone-dist').textContent = Math.round(nearDist) + ' km ' + (_lang==='en'?'away':'от вас');

  // Update info bar
  const bar = document.getElementById('info-bar');
  bar.textContent = (_lang==='en'?'YOUR ZONE: ':'ВАША ЗОНА: ') + nName(nearest) + ' · ' + Math.round(nearDist) + ' km';
  bar.style.color = '#44ff44';

  // Rotate globe to show player
  autoRotate = false;
  const targetY = -(lng + 180) * Math.PI / 180;
  const targetX = -(90 - lat) * Math.PI / 180 * 0.3;
  const startY = rotY, startX = rotX, start = Date.now();
  function lerpToPlayer() {
    const t = Math.min(1, (Date.now() - start) / 1500);
    const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    rotY = startY + (targetY - startY) * ease;
    rotX = startX + (targetX - startX) * ease;
    if (t < 1) requestAnimationFrame(lerpToPlayer);
    else setTimeout(() => { autoRotate = true; }, 5000);
  }
  lerpToPlayer();
}

// Geo button handler
document.getElementById('geo-btn').addEventListener('click', function() {
  if (!navigator.geolocation) {
    document.getElementById('info-bar').textContent = _lang==='en' ? 'Geolocation not supported' : 'Геолокация недоступна';
    return;
  }
  const btn = this;
  btn.textContent = '...';
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      btn.classList.add('active');
      btn.innerHTML = '&#9678;';
      showPlayerOnGlobe(pos.coords.latitude, pos.coords.longitude);
      // Save for region-map interop
      localStorage.setItem('awara_player_geo', JSON.stringify({
        lat: pos.coords.latitude, lng: pos.coords.longitude, ts: Date.now()
      }));
    },
    function() {
      btn.innerHTML = '&#9678;';
      document.getElementById('info-bar').textContent = _lang==='en' ? 'Geolocation denied' : 'Геолокация не получена';
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
  );
});

// Auto-load saved geolocation
(function() {
  try {
    const saved = JSON.parse(localStorage.getItem('awara_player_geo'));
    if (saved && saved.lat && saved.lng && (Date.now() - saved.ts < 3600000)) {
      setTimeout(function() {
        showPlayerOnGlobe(saved.lat, saved.lng);
        document.getElementById('geo-btn').classList.add('active');
      }, 1500);
    }
  } catch(e) {}
})();

    '<div><span style="color:rgba(201,168,76,.4)">'+(_lang==='en'?'Longitude':'Долгота')+'</span><br><span style="color:#c9a84c">' + Math.abs(n.lng).toFixed(1) + '° ' + (n.lng>0?'E':'W') + '</span></div>' +
    (n.gold ? '<div style="grid-column:1/-1;padding:6px 10px;background:rgba(255,180,0,.08);border:1px solid rgba(255,180,0,.2);border-radius:6px;text-align:center;color:#ffd700;font-size:10px">'+(_lang==='en'?'✦ GOLDEN NODE · DEPOSITS · POWER':'✦ ЗОЛОТОЙ УЗЕЛ · МЕСТОРОЖДЕНИЯ · СИЛА')+'</div>' : '') +
    '</div>' +
    '<div style="font-size:12px;color:rgba(220,210,190,.6);line-height:1.6;margin-bottom:14px">'+(_lang==='en'?'Node of Earth\'s icosahedro-dodecahedral structure. Point of planetary energy release.':'Узел икосаэдро-додекаэдрической структуры Земли. Точка выхода планетарной энергии.')+'</div>' +
    '<button onclick="this.closest(\'div\').parentElement.remove();setTimeout(()=>autoRotate=true,2000)" style="padding:10px 28px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:8px;color:#ffd700;font-family:Cinzel,serif;font-size:10px;cursor:pointer;letter-spacing:.1em">'+(_lang==='en'?'CLOSE':'ЗАКРЫТЬ')+'</button>' +
    '</div>';
  document.body.appendChild(m);
  // Поворот глобуса к узлу
  const targetY = -n.lng * Math.PI / 180, targetX = -(90 - n.lat) * Math.PI / 180;
  const startY = rotY, startX = rotX, start = Date.now();
  function lerp2() {
    const t = Math.min(1, (Date.now() - start) / 800);
    rotY = startY + (targetY - startY) * t;
    rotX = startX + (targetX - startX) * t;
    if (t < 1) requestAnimationFrame(lerp2);
  }
  lerp2();
}

// ══ СПИСОК ══
window.toggleList = function() {
  document.getElementById('list-panel').classList.toggle('show');
};

function renderList() {
  const grid = document.getElementById('lp-grid');
  grid.innerHTML = NODES.map(n =>
    '<div class="lp-node' + (n.gold ? ' gold' : '') + '" onclick="focusNode(' + n.id + ')">' +
    '<div class="lp-id">#' + n.id + (n.gold ? ' ✦' : '') + '</div>' +
    '<div class="lp-name">' + nName(n) + '</div>' +
    '<div class="lp-coord">' + Math.abs(n.lat).toFixed(1) + '°' + (n.lat>0?'N':'S') + ' ' + Math.abs(n.lng).toFixed(1) + '°' + (n.lng>0?'E':'W') + '</div>' +
    '<div class="lp-coord">' + nCountry(n) + '</div>' +
    (n.gold ? '<div class="lp-gold">✦ ' + _goldLabel + '</div>' : '') +
    '</div>'
  ).join('');
}
renderList();

window.focusNode = function(id) {
  const n = NODES.find(x => x.id === id);
  if (!n) return;
  const targetY = -n.lng * Math.PI / 180;
  const targetX = -(90 - n.lat) * Math.PI / 180;
  autoRotate = false;
  const startY = rotY, startX = rotX, start = Date.now();
  function lerp() {
    const t = Math.min(1, (Date.now() - start) / 1200);
    const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    rotY = startY + (targetY - startY) * ease;
    rotX = startX + (targetX - startX) * ease;
    if (t < 1) requestAnimationFrame(lerp);
    else setTimeout(() => { autoRotate = true; }, 3000);
  }
  lerp();
  document.getElementById('list-panel').classList.remove('show');
};
