<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AWARA · Лобби</title>
<!-- МОДУЛЬНОЕ ЛОББИ — чистый вид как index.html: одно кольцо + RA в центре + угловые разделы.
     Палитра из css/variables.css. Логика — модули. index.html НЕ трогаем. -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c; --gold-bright:#ffd700; --gold-light:#fff8d6; --gold-warm:#ffe080;
  --bg-void:#0a0a14; --bg-deep:#1a1430; --bg-legacy:#020108;
  --text:#d4c9a8; --muted:#8a7a5a;
  --f-dec:'Cinzel Decorative',serif; --f-head:'Cinzel',serif; --f-body:'Cormorant Garamond',serif; --f-mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%;-webkit-user-select:none;user-select:none}
body{background:
    radial-gradient(ellipse at 50% 18%, rgba(48,36,104,0.45) 0%, rgba(18,14,46,0.4) 34%, rgba(6,5,18,0.7) 64%, #000 100%),
    radial-gradient(ellipse at 84% 86%, rgba(30,60,120,0.22) 0%, rgba(0,0,0,0) 55%),
    radial-gradient(ellipse at 14% 84%, rgba(90,40,110,0.20) 0%, rgba(0,0,0,0) 55%),
    #000;
  color:var(--gold);font-family:var(--f-body);
  display:flex;flex-direction:column;align-items:center;
  padding:16px 14px 30px;overflow-x:hidden;min-height:100vh}
#cosmos{position:fixed;inset:0;z-index:0;pointer-events:none}
.shell{position:relative;z-index:1;width:100%;max-width:760px;display:flex;flex-direction:column;align-items:center}

/* Шапка */
.badge{font-family:var(--f-mono);font-size:8px;letter-spacing:0.45em;color:rgba(201,168,76,0.4);margin-bottom:10px}
.brand{font-family:var(--f-dec);font-weight:700;font-size:clamp(32px,7.5vw,58px);letter-spacing:0.28em;
  background:linear-gradient(180deg,#fffbe0 0%,#e8cc7a 55%,#c9a84c 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 30px rgba(201,168,76,0.42));line-height:1}
.ruler{font-family:var(--f-body);font-style:italic;font-size:clamp(10px,1.8vw,14px);
  color:rgba(255,220,150,0.42);letter-spacing:0.22em;margin:11px 0 2px}
.light-top{font-family:var(--f-mono);font-size:clamp(13px,2.6vw,16px);color:var(--gold-bright);letter-spacing:0.06em;margin-top:8px;
  filter:drop-shadow(0 0 12px rgba(255,215,0,0.3))}

/* Сцена-кольцо */
.stage{position:relative;width:min(92vw,600px);height:min(92vw,600px);margin:14px 0 6px}
#hiranya{position:absolute;inset:0;width:100%;height:100%;z-index:1}
.ra-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;display:flex;flex-direction:column;align-items:center}
.central-sun{width:clamp(60px,14vw,88px);height:clamp(60px,14vw,88px);border-radius:50%;
  background:radial-gradient(circle at 38% 34%,#fff8d6,#ffd700 40%,#c9a84c 74%,#7a5a14);
  box-shadow:0 0 64px rgba(255,215,0,0.55),0 0 150px rgba(201,168,76,0.32),inset 0 0 28px rgba(255,255,255,0.32);
  display:flex;align-items:center;justify-content:center;animation:breath 6s ease-in-out infinite}
.central-sun .ra{font-family:var(--f-dec);font-weight:700;font-size:clamp(17px,3.8vw,25px);letter-spacing:0.08em;color:#3a2a06;text-shadow:0 1px 1px rgba(255,255,255,0.4)}
@keyframes breath{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.045);filter:brightness(1.14)}}

/* Угловые разделы — минимализм (как в index.html) */
.gate{position:absolute;width:23%;max-width:138px;text-align:center;cursor:pointer;z-index:4;
  padding:6px 6px;background:transparent;border:none;transition:all .35s cubic-bezier(.22,1,.36,1)}
.gate:hover{transform:translateY(-2px)}
.gate .ico{font-size:27px;display:block;color:var(--gold-bright);filter:drop-shadow(0 0 12px var(--glow,rgba(255,215,0,0.45)));transition:transform .35s,filter .35s}
.gate:hover .ico{transform:scale(1.12);filter:drop-shadow(0 0 22px var(--glow,rgba(255,215,0,0.7)))}
.gate .nm{font-family:var(--f-head);font-weight:600;letter-spacing:0.2em;font-size:14px;color:var(--gold-bright);display:block;margin-top:6px}
.gate .ds{font-family:var(--f-body);font-style:italic;font-size:12px;color:rgba(201,168,76,0.5);display:block;margin-top:2px;transition:color .35s}
.gate:hover .ds{color:rgba(255,220,150,0.85)}
.gate.nw{top:24%;left:16%}
.gate.ne{top:24%;right:16%}
.gate.sw{bottom:18%;left:16%}
.gate.se{bottom:18%;right:16%}
.gate.g-game{--glow:rgba(120,170,255,0.6)}
.gate.g-chronicle{--glow:rgba(255,215,0,0.6)}
.gate.g-exchange{--glow:rgba(100,220,230,0.55)}
.gate.g-social{--glow:rgba(120,170,255,0.6)}

/* Нижняя панель — лёгкое стекло */
.statusbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;
  font-family:var(--f-mono);font-size:11px;letter-spacing:0.12em;color:rgba(201,168,76,0.82);
  border:1px solid rgba(201,168,76,0.14);border-radius:14px;
  background:rgba(12,9,28,0.3);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  padding:11px 16px;margin-top:4px;width:100%;max-width:540px}
.statusbar .sep{color:rgba(201,168,76,0.3)}
.statusbar b{color:var(--gold-bright);font-weight:400}
.lang{display:flex;gap:4px;margin-left:auto}
.lang button{font-family:var(--f-mono);font-size:10px;letter-spacing:0.1em;background:transparent;
  border:1px solid rgba(201,168,76,0.3);color:rgba(201,168,76,0.7);border-radius:6px;padding:3px 8px;cursor:pointer;transition:all .3s}
.lang button.on{color:var(--gold-bright);border-color:var(--gold-bright)}

.actions{display:flex;gap:14px;margin-top:18px;flex-wrap:wrap;justify-content:center}
.act{font-family:var(--f-mono);font-size:11px;letter-spacing:0.2em;color:rgba(201,168,76,0.82);
  text-transform:uppercase;background:rgba(12,9,28,0.3);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  border:1px solid rgba(201,168,76,0.4);
  border-radius:11px;padding:10px 18px;cursor:pointer;transition:all .3s;text-decoration:none}
.act:hover{color:var(--gold-bright);border-color:var(--gold-bright);box-shadow:0 0 18px rgba(255,215,0,0.2);transform:translateY(-1px)}
.footer{font-family:var(--f-mono);font-size:9px;letter-spacing:0.34em;color:rgba(201,168,76,0.4);margin-top:24px}
.version{position:fixed;bottom:9px;right:11px;z-index:2;font-family:var(--f-mono);font-size:8px;color:rgba(255,255,255,0.16);letter-spacing:0.1em}

/* Радиальная раскладка держится и в узком окне (как index.html).
   На компактных экранах чуть уменьшаем разделы, но НЕ складываем в столбик. */
@media (max-width:560px){
  .gate{width:27%;max-width:none;padding:3px}
  .gate .ico{font-size:21px}
  .gate .nm{font-size:11px;letter-spacing:0.12em}
  .gate .ds{font-size:9px}
  .gate.nw,.gate.ne{top:22%}
  .gate.sw,.gate.se{bottom:16%}
}
/* Столбик — только на очень узких телефонах */
@media (max-width:360px){
  .stage{height:auto;display:flex;flex-direction:column;align-items:center;gap:8px;padding:6px 0}
  #hiranya{position:relative;width:min(82vw,320px);height:min(82vw,320px);inset:auto}
  .ra-center{position:absolute;top:min(41vw,160px)}
  .gate{position:static!important;width:46%;max-width:none}
}

/* Модалка / тост (ui-module) — стекло */
.awara-modal-overlay{position:fixed;inset:0;background:rgba(2,1,10,0.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.awara-modal{background:rgba(16,12,36,0.55);backdrop-filter:blur(18px) saturate(1.2);-webkit-backdrop-filter:blur(18px) saturate(1.2);
  border:1px solid rgba(201,168,76,0.45);border-radius:20px;padding:24px 28px;max-width:460px;width:100%;
  box-shadow:0 0 80px rgba(201,168,76,0.22),inset 0 1px 0 rgba(255,255,255,0.08);max-height:82vh;overflow-y:auto}
.awara-modal h2,.awara-modal h3{font-family:var(--f-dec);color:var(--gold-bright);margin-bottom:14px;letter-spacing:0.08em}
.awara-modal .mcat{border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:11px 13px;margin-bottom:9px;background:rgba(201,168,76,0.04)}
.awara-modal .mcat .cl{font-family:var(--f-head);color:var(--gold-bright);font-size:13px;letter-spacing:0.06em}
.awara-modal .mcat .it{font-family:var(--f-body);font-size:14px;color:rgba(201,168,76,0.88);margin-top:4px;line-height:1.5}
.awara-modal .mcat .locked,.awara-modal .mcat .cl.locked{color:rgba(201,168,76,0.32)}
.awara-toast{position:fixed;left:50%;bottom:64px;transform:translateX(-50%);z-index:520;
  background:rgba(12,9,28,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--gold);color:var(--gold-bright);
  font-family:var(--f-mono);font-size:12px;letter-spacing:0.06em;padding:11px 20px;border-radius:12px;box-shadow:0 0 26px rgba(255,215,0,0.2)}
</style>

<!-- Космос: спокойный фон — звёзды + лёгкие туманности -->
<script>
(function(){
  var c=document.getElementById('cosmos'),x=c.getContext('2d'),W,H,st=[],neb=[];
  function rz(){W=c.width=innerWidth;H=c.height=innerHeight;}
  addEventListener('resize',rz);rz();
  for(var i=0;i<190;i++)st.push({x:Math.random(),y:Math.random(),p:Math.random()*6.28,s:Math.random()*1.2+0.3,sp:Math.random()*0.5+0.3,h:Math.random()<0.1});
  var cols=[[120,95,200],[70,110,190],[180,150,90]];
  for(var j=0;j<3;j++)neb.push({x:[0.5,0.83,0.15][j],y:[0.2,0.85,0.83][j],r:Math.random()*0.26+0.24,c:cols[j],p:Math.random()*6.28});
  function f(t){
    var ft=t/1000;x.clearRect(0,0,W,H);
    for(var j=0;j<neb.length;j++){var n=neb[j];var pulse=0.55+Math.sin(ft*0.1+n.p)*0.45;
      var g=x.createRadialGradient(n.x*W,n.y*H,0,n.x*W,n.y*H,Math.min(W,H)*n.r);
      g.addColorStop(0,'rgba('+n.c[0]+','+n.c[1]+','+n.c[2]+','+(0.06*pulse)+')');
      g.addColorStop(1,'rgba('+n.c[0]+','+n.c[1]+','+n.c[2]+',0)');
      x.fillStyle=g;x.fillRect(0,0,W,H);}
    for(var i=0;i<st.length;i++){var s=st[i],tw=0.15+Math.sin(ft*s.sp+s.p)*0.13;
      x.fillStyle=s.h?'rgba(190,205,255,'+Math.max(0,tw)+')':'rgba(255,248,220,'+Math.max(0,tw)+')';
      x.fillRect(s.x*W,s.y*H,s.s,s.s);}
    requestAnimationFrame(f);
  }
  requestAnimationFrame(f);
})();

// Хираньягарбха — золотое яйцо, делённое на 4 зоны, RA в центре
(function(){
  var cv=document.getElementById('hiranya'),cx=cv.getContext('2d'),R=0,CX=0,CY=0,dpr=Math.min(window.devicePixelRatio||1,2);
  var EA=0.96, EB=0.88, TAPER=0.13; // верт./гориз. полуось + заострение верха (плотное яйцо, окна внутри)
  function fit(){var box=cv.getBoundingClientRect();var w=box.width||340,h=box.height||340;
    cv.width=w*dpr;cv.height=h*dpr;cx.setTransform(dpr,0,0,dpr,0,0);CX=w/2;CY=h/2;R=Math.min(w,h)/2;}
  addEventListener('resize',fit);
  // точка контура яйца: t — параметр, s — масштаб (верх уже низа)
  function egg(t,s){var ny=Math.sin(t),nx=Math.cos(t),tp=1+TAPER*ny;return {x:nx*R*EB*s*tp,y:ny*R*EA*s};}
  function eggPath(s){cx.beginPath();for(var i=0;i<=140;i++){var p=egg(i/140*6.283,s);i?cx.lineTo(p.x,p.y):cx.moveTo(p.x,p.y);}cx.closePath();}
  function draw(t){
    var sec=t/1000;if(!R)fit();
    cx.clearRect(0,0,cv.width,cv.height);
    cx.save();cx.translate(CX,CY);
    var pulse=0.85+Math.sin(sec*0.7)*0.15;
    // мягкое свечение в центре яйца
    var g=cx.createRadialGradient(0,0,0,0,0,R*0.85);
    g.addColorStop(0,'rgba(255,224,128,0.07)');g.addColorStop(0.5,'rgba(201,168,76,0.025)');g.addColorStop(1,'rgba(201,168,76,0)');
    cx.fillStyle=g;cx.beginPath();cx.arc(0,0,R*0.85,0,6.283);cx.fill();
    // ОБЪЁМ — глянцевое тело яйца как 3D-сфера (свет сверху-слева)
    cx.save();eggPath(0.92);cx.clip();
    // 1) плотное тело — тёмная глубина с золотым подтоном (читается как объёмный объект)
    var body=cx.createRadialGradient(-R*0.28,-R*0.36,R*0.05,-R*0.05,0,R*1.25);
    body.addColorStop(0,'rgba(96,76,32,0.88)');
    body.addColorStop(0.28,'rgba(60,46,22,0.84)');
    body.addColorStop(0.60,'rgba(28,20,44,0.82)');
    body.addColorStop(1,'rgba(4,3,12,0.94)');
    cx.fillStyle=body;cx.fillRect(-R,-R,R*2,R*2);
    // 2) яркий блик сверху-слева
    var spec=cx.createRadialGradient(-R*0.30,-R*0.44,0,-R*0.30,-R*0.44,R*0.48);
    spec.addColorStop(0,'rgba(255,250,224,'+(0.52+0.1*pulse)+')');
    spec.addColorStop(0.5,'rgba(255,231,150,0.18)');
    spec.addColorStop(1,'rgba(255,231,150,0)');
    cx.fillStyle=spec;cx.fillRect(-R,-R,R*2,R*2);
    // 3) тёмный терминатор снизу-справа
    var occ=cx.createRadialGradient(R*0.40,R*0.46,R*0.08,R*0.30,R*0.34,R*1.05);
    occ.addColorStop(0,'rgba(0,0,0,0.55)');occ.addColorStop(0.6,'rgba(0,0,0,0.22)');occ.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=occ;cx.fillRect(-R,-R,R*2,R*2);
    cx.restore();
    // 4 зоны — мягкая подсветка квадрантов (обрезана контуром яйца)
    cx.save();eggPath(0.92);cx.clip();
    var zones=[['rgba(120,170,255,',-1,-1],['rgba(255,215,0,',1,-1],['rgba(100,220,230,',-1,1],['rgba(150,120,255,',1,1]];
    for(var z=0;z<4;z++){var sx=zones[z][1],sy=zones[z][2];
      var zg=cx.createRadialGradient(sx*R*0.40,sy*R*0.48,0,sx*R*0.40,sy*R*0.48,R*0.72);
      zg.addColorStop(0,zones[z][0]+(0.08*pulse)+')');zg.addColorStop(1,zones[z][0]+'0)');
      cx.fillStyle=zg;cx.fillRect(-R,-R,R*2,R*2);}
    cx.restore();
    // основной ободок — ярче на свету (верх-лево), тусклее в тени
    var rim=cx.createLinearGradient(-R*0.72,-R*0.72,R*0.72,R*0.72);
    rim.addColorStop(0,'rgba(255,244,196,'+(0.85*pulse+0.12)+')');
    rim.addColorStop(0.5,'rgba(201,168,76,0.5)');
    rim.addColorStop(1,'rgba(120,95,40,0.30)');
    cx.strokeStyle=rim;cx.lineWidth=2;eggPath(0.92);cx.stroke();
    // тонкий внутренний контур-яйцо
    cx.strokeStyle='rgba(201,168,76,0.15)';cx.lineWidth=1;eggPath(0.74);cx.stroke();
    // крест-разделитель на 4 зоны (обрезан по яйцу)
    cx.save();eggPath(0.92);cx.clip();
    cx.strokeStyle='rgba(201,168,76,0.30)';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(0,-R);cx.lineTo(0,R);cx.stroke();
    cx.beginPath();cx.moveTo(-R,0);cx.lineTo(R,0);cx.stroke();
    cx.restore();
    // узлы на пересечении осей с контуром (верх/низ/лево/право)
    cx.fillStyle='rgba(255,224,128,0.85)';
    [egg(-1.5708,0.92),egg(1.5708,0.92),egg(3.14159,0.92),egg(0,0.92)].forEach(function(p){cx.beginPath();cx.arc(p.x,p.y,2.6,0,6.283);cx.fill();});
    // мерцающие точки по контуру яйца
    cx.globalAlpha=0.55;cx.fillStyle='rgba(255,224,128,0.6)';var dots=64;
    for(var d=0;d<dots;d++){var p=egg(d/dots*6.283,0.92);cx.beginPath();cx.arc(p.x,p.y,0.8,0,6.283);cx.fill();}
    cx.globalAlpha=1;
    cx.restore();
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(function(t){fit();draw(t);});
})();

// Язык RU/EN
function applyLang(lang){
  document.querySelectorAll('[data-ru][data-en]').forEach(function(el){el.innerHTML=el.getAttribute('data-'+lang)||el.textContent;});
  document.querySelectorAll('.lang button').forEach(function(b){b.classList.toggle('on',b.dataset.lang===lang);});
  try{localStorage.setItem('awara_lang',lang);}catch(e){}
}
(function(){var lang='ru';try{lang=localStorage.getItem('awara_lang')||'ru';}catch(e){}if(lang!=='ru'&&lang!=='en')lang='ru';
  applyLang(lang);document.querySelectorAll('.lang button').forEach(function(b){b.onclick=function(){applyLang(b.dataset.lang);};});})();

<!-- Модульная сборка -->
<script type="module">
import { initLobby, showPassport } from './js/lobby-module.js';
import { initGame, showGameMenu } from './js/game-module.js';
import { getMenuState } from './js/menu-module.js';
import { showModal, showToast } from './js/ui-module.js';

function menuHtml(){
  const ms = getMenuState();
  const acc = ms.accessible || {};
  const lck = ms.locked || {};
  let html = Object.keys(acc).map(k=>{
    const c = acc[k];
    const items = (c.items||[]).map(it=>it.label).join(' · ');
    return '<div class="mcat"><div class="cl">'+(c.icon||'')+' '+c.label+'</div><div class="it">'+(items||'—')+'</div></div>';
  }).join('');
  const lockedItems = Object.keys(lck).map(k=>(lck[k].items||[]).map(it=>it.label)).flat();
  if(lockedItems.length){
    html += '<div class="mcat"><div class="cl locked">⊙ Закрыто пока</div><div class="it locked">'+lockedItems.join(' · ')+'</div></div>';
  }
  return html || '<div class="mcat"><div class="it">Меню пусто</div></div>';
}

(async ()=>{
  try{ await initLobby(); await initGame(); console.info('[Lobby page] Готово'); }
  catch(e){ console.error('[Lobby page] Ошибка:', e && e.message ? e.message : e); }
})();

document.getElementById('btn-passport').onclick = ()=>showPassport();
document.getElementById('btn-menu').onclick = ()=>showModal({ title:'Доступные пути', content: menuHtml() });

window.addEventListener('awara:section', (e)=>{
  const s = e.detail && e.detail.section;
  if(s === 'game'){ showGameMenu(); }
  else { showToast('Раздел «'+s+'» — скоро'); }
});
</script>
</body>
</html>
