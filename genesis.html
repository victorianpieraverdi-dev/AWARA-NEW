<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AWARA — Исток</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{ --gold:#c9a84c; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#05050a; cursor:pointer; }
  #c{ display:block; position:fixed; inset:0; }
  #ui{ position:fixed; inset:0; pointer-events:none; display:flex; flex-direction:column;
       align-items:center; justify-content:space-between; padding:7vh 0 9vh; }
  #title{ font-family:'Cinzel',serif; color:#f3e6c4; letter-spacing:.5em;
          font-size:clamp(28px,6vw,64px); text-shadow:0 0 34px rgba(201,168,76,.65);
          opacity:0; transform:translateY(-8px); transition:opacity 2.6s ease .6s, transform 2.6s ease .6s; }
  #sub{ font-family:'Cormorant Garamond',serif; font-style:italic; color:#c7b687;
        font-size:clamp(15px,2.6vw,26px); letter-spacing:.18em; opacity:0; transition:opacity 1.8s ease; }
  #title.show{ opacity:1; transform:translateY(0); }
  #sub.show{ opacity:1; animation:breathe 3.6s ease-in-out infinite; }
  @keyframes breathe{ 0%,100%{ opacity:.4; } 50%{ opacity:.95; } }
  #flash{ position:fixed; inset:0; opacity:0; pointer-events:none;
          background:radial-gradient(circle at 50% 50%, #fff7e0 0%, #e8c879 28%, rgba(10,10,20,0) 72%); }
  #vig{ position:fixed; inset:0; pointer-events:none;
        background:radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 45%, rgba(0,0,0,.65) 100%); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="vig"></div>
<div id="ui">
  <div id="title">AWARA</div>
  <div id="sub">Коснись Искры, чтобы войти</div>
</div>
<div id="flash"></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from "three";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

const sub = document.getElementById('sub');
const flash = document.getElementById('flash');

// ---------- renderer / scene / camera ----------
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0, 0, 30);

// ---------- nebula background ----------
const NEB_VERT = `varying vec3 vDir; void main(){ vDir = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`;
const NEB_FRAG = `
varying vec3 vDir; uniform float uTime;
float hash(vec3 p){ p=fract(p*0.3183099+0.1); p*=17.0; return fract(p.x*p.y*p.z*(p.x+p.y+p.z)); }
float noise(vec3 x){ vec3 i=floor(x); vec3 f=fract(x); f=f*f*(3.0-2.0*f);
  return mix(mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),
                 mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
             mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),
                 mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z); }
float fbm(vec3 p){ float v=0.0; float a=0.5; for(int i=0;i<5;i++){ v+=a*noise(p); p*=2.0; a*=0.5; } return v; }
void main(){
  vec3 d = normalize(vDir);
  float n  = fbm(d*3.0 + vec3(0.0,0.0,uTime*0.02));
  float n2 = fbm(d*6.0 - vec3(uTime*0.015));
  float clouds = smoothstep(0.45,1.0, n*0.7 + n2*0.4);
  vec3 base = vec3(0.015,0.015,0.04);
  vec3 neb  = mix(vec3(0.05,0.06,0.17), vec3(0.16,0.10,0.22), n2);
  vec3 col  = base + neb*clouds*0.95;
  gl_FragColor = vec4(col,1.0);
}`;
const nebMat = new THREE.ShaderMaterial({ uniforms:{ uTime:{value:0} }, vertexShader:NEB_VERT, fragmentShader:NEB_FRAG, side:THREE.BackSide, depthWrite:false });
scene.add(new THREE.Mesh(new THREE.SphereGeometry(900,32,32), nebMat));

// ---------- canvas textures ----------
function dotTex(){
  const s=64, cv=document.createElement('canvas'); cv.width=cv.height=s;
  const x=cv.getContext('2d'); const g=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(0.3,'rgba(255,255,255,0.6)'); g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g; x.fillRect(0,0,s,s); return new THREE.CanvasTexture(cv);
}
function radialTex(stops){
  const s=256, cv=document.createElement('canvas'); cv.width=cv.height=s;
  const x=cv.getContext('2d'); const g=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  stops.forEach(function(p){ g.addColorStop(p[0], p[1]); });
  x.fillStyle=g; x.fillRect(0,0,s,s); return new THREE.CanvasTexture(cv);
}
function flareTex(){
  const s=256, cv=document.createElement('canvas'); cv.width=cv.height=s;
  const x=cv.getContext('2d'); x.translate(s/2,s/2);
  function beam(len,w,rot){ x.save(); x.rotate(rot);
    const g=x.createLinearGradient(-len,0,len,0);
    g.addColorStop(0,'rgba(232,200,121,0)'); g.addColorStop(0.5,'rgba(255,242,205,0.9)'); g.addColorStop(1,'rgba(232,200,121,0)');
    x.fillStyle=g; x.fillRect(-len,-w/2,len*2,w); x.restore(); }
  beam(s/2,7,0); beam(s/2,7,Math.PI/2);
  beam(s/2*0.7,3,Math.PI/4); beam(s/2*0.7,3,-Math.PI/4);
  return new THREE.CanvasTexture(cv);
}
const starTex = dotTex();
const glowMap = radialTex([[0,'rgba(255,250,235,1)'],[0.2,'rgba(255,225,150,0.9)'],[0.5,'rgba(201,168,76,0.35)'],[1,'rgba(201,168,76,0)']]);

// ---------- stars ----------
const N=4000, sp=new Float32Array(N*3), scol=new Float32Array(N*3);
for(let i=0;i<N;i++){
  const r=90+Math.random()*650, u=Math.random()*2-1, th=Math.random()*Math.PI*2, rr=Math.sqrt(1-u*u);
  sp[i*3]=r*rr*Math.cos(th); sp[i*3+1]=r*rr*Math.sin(th); sp[i*3+2]=r*u;
  const w=0.55+Math.random()*0.45, gold=Math.random()<0.15;
  scol[i*3]=w; scol[i*3+1]=gold?w*0.85:w; scol[i*3+2]=gold?w*0.6:w*0.95;
}
const starGeo=new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(sp,3));
starGeo.setAttribute('color', new THREE.BufferAttribute(scol,3));
const stars=new THREE.Points(starGeo, new THREE.PointsMaterial({ size:2.4, map:starTex, vertexColors:true, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, sizeAttenuation:true }));
scene.add(stars);

// ---------- inflowing dust ----------
const M=700, dpos=new Float32Array(M*3), dat=[];
for(let i=0;i<M;i++){
  const a=Math.random()*Math.PI*2, r=6+Math.random()*22, z=(Math.random()-0.5)*10;
  dat.push({a:a, r:r, z:z, sp:0.01+Math.random()*0.03});
  dpos[i*3]=Math.cos(a)*r; dpos[i*3+1]=Math.sin(a)*r; dpos[i*3+2]=z;
}
const dgeo=new THREE.BufferGeometry(); dgeo.setAttribute('position', new THREE.BufferAttribute(dpos,3));
const dust=new THREE.Points(dgeo, new THREE.PointsMaterial({ size:1.0, map:starTex, color:0xe8c879, transparent:true, opacity:0.85, depthWrite:false, blending:THREE.AdditiveBlending }));
scene.add(dust);

// ---------- the Spark ----------
const spark=new THREE.Group(); scene.add(spark);
const core=new THREE.Mesh(new THREE.SphereGeometry(0.9,48,48), new THREE.MeshBasicMaterial({ color:new THREE.Color(2.2,1.8,1.15) }));
spark.add(core);
const glow=new THREE.Sprite(new THREE.SpriteMaterial({ map:glowMap, color:0xffffff, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false }));
glow.scale.set(12,12,1); spark.add(glow);
const flare=new THREE.Sprite(new THREE.SpriteMaterial({ map:flareTex(), color:0xffffff, transparent:true, opacity:0.55, blending:THREE.AdditiveBlending, depthWrite:false }));
flare.scale.set(34,34,1); spark.add(flare);
const ring=new THREE.Mesh(new THREE.TorusGeometry(5,0.03,8,128), new THREE.MeshBasicMaterial({ color:0xc9a84c, transparent:true, opacity:0.3, blending:THREE.AdditiveBlending }));
spark.add(ring);
const ring2=new THREE.Mesh(new THREE.TorusGeometry(7.6,0.02,8,128), new THREE.MeshBasicMaterial({ color:0x8a6ad8, transparent:true, opacity:0.18, blending:THREE.AdditiveBlending }));
ring2.rotation.x=Math.PI/2.4; spark.add(ring2);

// ---------- postprocessing ----------
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 1.5, 0.85, 0.0);
composer.addPass(bloom);

// ---------- interaction ----------
let px=0, py=0, focus=0, focusT=0;
addEventListener('pointermove', function(e){
  px=(e.clientX/innerWidth)*2-1; py=(e.clientY/innerHeight)*2-1;
  focusT=Math.max(0, 1-Math.hypot(px,py)*1.1);
});
let awakening=false, aStart=0;
function awaken(){ if(awakening) return; awakening=true; aStart=performance.now(); sub.classList.remove('show'); }
addEventListener('pointerdown', awaken);

// ---------- loop ----------
function updateDust(){
  const p=dgeo.attributes.position.array;
  for(let i=0;i<M;i++){
    const d=dat[i];
    d.a += 0.004 + (1.0/d.r)*0.02;
    d.r -= d.sp*(awakening?4.0:1.0);
    if(d.r<1.2){ d.r=18+Math.random()*12; d.a=Math.random()*Math.PI*2; d.z=(Math.random()-0.5)*10; }
    p[i*3]=Math.cos(d.a)*d.r; p[i*3+1]=Math.sin(d.a)*d.r; p[i*3+2]=d.z*(d.r/30);
  }
  dgeo.attributes.position.needsUpdate=true;
}
function tick(){
  requestAnimationFrame(tick);
  const t=performance.now()*0.001;
  nebMat.uniforms.uTime.value=t;
  focus += (focusT-focus)*0.05;
  const pulse=1+0.12*Math.sin(t*2.0);
  const f=1+focus*0.5;
  core.scale.setScalar(pulse*f);
  glow.material.opacity=0.7+0.2*Math.sin(t*2.0)+focus*0.2;
  glow.scale.setScalar((11+Math.sin(t*1.5))*(1+focus*0.25));
  flare.material.rotation += 0.0008; flare.material.opacity=0.5+focus*0.3;
  ring.rotation.z += 0.002; ring.rotation.x=0.5*Math.sin(t*0.2);
  ring2.rotation.z -= 0.0015;
  updateDust();
  stars.rotation.y += 0.0002;
  camera.position.x += ((px*3)-camera.position.x)*0.03;
  camera.position.y += ((-py*3)-camera.position.y)*0.03;
  if(awakening){
    const pr=Math.min(1,(performance.now()-aStart)/1900);
    const e=pr*pr*(3-2*pr);
    camera.position.z=30-(30-5)*e;
    bloom.strength=1.5+e*3.0;
    core.scale.setScalar(pulse*(1+e*6));
    glow.scale.setScalar(12*(1+e*4));
    flash.style.opacity=String(Math.max(0,(pr-0.55)/0.45));
    if(pr>=1){ window.location.href='multiverse-map.html'; awakening=false; }
  }
  camera.lookAt(0,0,0);
  composer.render();
}
tick();

addEventListener('resize', function(){
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight); bloom.setSize(innerWidth,innerHeight);
});

setTimeout(function(){
  document.getElementById('title').classList.add('show');
  document.getElementById('sub').classList.add('show');
}, 800);
</script>
</body>
</html>
