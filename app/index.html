<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AWARA · core stand</title>
<style>
	* { box-sizing: border-box; }
	html, body { margin: 0; height: 100%; background: #05050a; color: #e8dcc0;
		font-family: system-ui, sans-serif; overflow: hidden; }
	#scene { position: fixed; inset: 0; display: block; }
	#hud { position: fixed; left: 16px; top: 16px; width: 290px; padding: 16px;
		background: rgba(10,10,20,.55); backdrop-filter: blur(8px);
		border: 1px solid rgba(201,168,76,.3); border-radius: 14px; z-index: 10; }
	#hud h1 { font-size: 13px; letter-spacing: .18em; margin: 0 0 4px; color: #c9a84c; }
	#nodeLabel { font-size: 12px; opacity: .85; margin-bottom: 12px; color: #ffe9b0; }
	.row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
	button { flex: 1 1 auto; padding: 7px 9px; font-size: 12px; cursor: pointer;
		color: #e8dcc0; background: rgba(201,168,76,.12);
		border: 1px solid rgba(201,168,76,.4); border-radius: 8px; }
	button:hover { background: rgba(201,168,76,.25); }
	label { font-size: 11px; opacity: .8; display: block; margin: 10px 0 4px; }
	input[type=range] { width: 100%; }
	textarea { width: 100%; height: 58px; resize: vertical; border-radius: 8px;
		background: rgba(0,0,0,.3); color: #e8dcc0; border: 1px solid rgba(201,168,76,.3);
		padding: 6px; font: inherit; font-size: 12px; }
	#reflection { font-size: 11px; opacity: .9; margin-top: 8px; min-height: 26px; color: #ffe9b0; }
	#quests { font-size: 11px; opacity: .92; margin-top: 6px; color: #c9a84c; }
	button.rec { background: rgba(220,80,80,.28); border-color: rgba(220,80,80,.7); }
	#chakras { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
	.chakra-row { display: flex; align-items: center; gap: 6px; }
	.chakra-name { flex: 0 0 86px; font-size: 10px; opacity: .8; }
	.chakra-bar { flex: 1 1 auto; height: 6px; border-radius: 4px;
		background: rgba(255,255,255,.08); overflow: hidden; }
	.chakra-bar > i { display: block; height: 100%; width: 0;
		background: linear-gradient(90deg, #6b6256, #c9a84c); transition: width .6s ease; }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div id="hud">
	<h1>AWARA · CORE</h1>
	<div id="nodeLabel"></div>

	<div class="row">
		<button id="intro">Пролёт 0→1→2</button>
		<button id="back">← Назад</button>
	</div>
	<div class="row">
		<button data-dir="west">Запад · Матрицы</button>
		<button data-dir="east">Восток · Тигель</button>
	</div>
	<div class="row">
		<button data-dir="north">Север · Игра</button>
		<button data-dir="south">Юг · Даймон</button>
	</div>

	<label>Свет игрока (playerLight): <span id="lightVal">0.00</span></label>
	<input id="light" type="range" min="0" max="1" step="0.01" value="0" />

	<label>Дневник дня — голос или текст (Голос Истины):</label>
	<textarea id="diary" placeholder="Сегодня лепил из глины, был в бане, говорил с сердцем..."></textarea>
	<div class="row">
		<button id="micBtn" data-on="● Запись..." data-off="🎤 Голос">🎤 Голос</button>
		<button id="diaryBtn">Прожить день →</button>
	</div>
	<div id="reflection"></div>
	<div id="quests"></div>
	<div id="chakras"></div>
	<div id="diaryMsgs" hidden
		data-listening="Голос Истины слушает..."
		data-nospeech="Распознавание речи недоступно в этом браузере — пиши текстом."
		data-quests="Подсказка:"></div>
</div>
<script type="module" src="./main.ts"></script>
</body>
</html>
