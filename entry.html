<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AWARA · Исток</title>
<!-- Вход «Исток» v2. Концепт: тьма → дыхание → касание → первая искра света → покой.
     Без сфер, слота Даймона и полярности Луна/Солнце на пороге.
     Сферы и Даймон проявляются позже, когда игрок формирует их изнутри.
     Ида/Пингала вводятся выше по уровням, не здесь.
     Спек: docs/vision-2026-05-31.md -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#02010a;font-family:'Cormorant Garamond',serif;user-select:none;-webkit-user-select:none;cursor:default}
#c{position:fixed;inset:0;z-index:1;touch-action:none}

/* TEXT LAYER */
.line{position:fixed;left:50%;transform:translateX(-50%);text-align:center;z-index:10;opacity:0;transition:opacity 2.2s ease;pointer-events:none;max-width:84vw}
.line.show{opacity:1}
#invite{top:60%;font-style:italic;font-size:clamp(16px,3.6vw,23px);color:rgba(255,255,255,0.52);letter-spacing:0.08em;line-height:1.65}
#breathword{top:50%;transform:translate(-50%,-50%);font-family:'Cinzel',serif;font-size:clamp(12px,2.4vw,15px);letter-spacing:0.4em}
#afterword{top:60%;font-style:italic;font-size:clamp(16px,3.6vw,23px);color:rgba(255,219,150,0.66);letter-spacing:0.08em}
#go{bottom:8%;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.34em;color:rgba(201,168,76,0.7);cursor:pointer;pointer-events:auto;text-decoration:none;transition:opacity 2.2s ease,color .4s}
#go.show{opacity:0.75}
#go:hover{color:#ffd700}
.version{position:fixed;bottom:12px;right:14px;z-index:9;font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(255,255,255,0.18);letter-spacing:0.1em}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="line" id="invite">Здесь темно.<br>Вдохни — и коснись тьмы.</div>
<div class="line" id="breathword">В&nbsp;Д&nbsp;О&nbsp;Х</div>
<div class="line" id="afterword">Свет начался.</div>
<a class="line" id="go" href="dzyan.html">войти →</a>
<div class="version">AWARA · Исток v2</div>

<script>
// ════════════════════════════════════════════════
//  ВХОД «ИСТОК» v2
//  Состояния: dark → breath → spark → rest
//  Тьма → дыхание (ведущее кольцо) → касание рождает искру → покой.
//  НЕТ: сфер, слота Даймона, Луны/Солнца, Ида/Пингала. Всё это — позже.
// ════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize(){
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);

let phase = 'dark';     // dark → breath → spark → rest
let startTs = 0;
let warmth = 0;         // 0..1 — насколько тьма потеплела после искры
let spark = null;       // { x, y, t0 }
const DARK_MS = 2600;   // секунды чистой тьмы перед приглашением

// Звёзды (статичные позиции, мягкое мерцание)
const stars = [];
for (let i = 0; i < 120; i++){
  stars.push({ x: Math.random(), y: Math.random(), p: Math.random() * 6.2832, s: Math.random() * 1.1 + 0.4 });
}

function setLine(id, on){
  const el = document.getElementById(id);
  if (el) el.classList.toggle('show', on);
}

function draw(ts){
  if (!startTs) startTs = ts;
  const el = ts - startTs;
  const ft = ts / 1000;
  const cx = W * 0.5, cy = H * 0.5;

  // Тьма → приглашение
  if (phase === 'dark' && el > DARK_MS){ phase = 'breath'; setLine('invite', true); }

  // ФОН — тёмный космос, чуть теплеет с ростом warmth
  const bg = ctx.createRadialGradient(cx, cy * 0.92, 0, cx, cy, Math.max(W, H) * 0.8);
  bg.addColorStop(0, 'rgb(' + (11 + Math.round(36 * warmth)) + ',' + (6 + Math.round(14 * warmth)) + ',' + (32 + Math.round(6 * warmth)) + ')');
  bg.addColorStop(0.55, '#050215');
  bg.addColorStop(1, '#02010a');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Звёзды
  for (const st of stars){
    const tw = 0.14 + Math.sin(ft * 1.5 + st.p) * 0.1;
    ctx.fillStyle = 'rgba(255,255,255,' + Math.max(0, tw) + ')';
    ctx.fillRect(st.x * W, st.y * H, st.s, st.s);
  }

  // Семя света в центре (до искры) — еле тлеет, дышит
  if (phase !== 'rest' && !spark){
    const sp = 0.5 + Math.sin(ft * 1.4) * 0.5;
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 44);
    g.addColorStop(0, 'rgba(201,168,76,' + (0.18 + sp * 0.22) + ')');
    g.addColorStop(1, 'rgba(201,168,76,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, 44, 0, 6.2832); ctx.fill();
    ctx.fillStyle = 'rgba(255,240,205,' + (0.35 + sp * 0.4) + ')';
    ctx.beginPath(); ctx.arc(cx, cy, 2.4 + sp * 2.6, 0, 6.2832); ctx.fill();
  }

  // Дыхание — ведущее кольцо + слово вдох/выдох
  if (phase === 'breath'){
    const breath = Math.sin(ft * 0.85) * 0.5 + 0.5; // ~7.4с цикл
    const rr = 74 + breath * 78;
    ctx.strokeStyle = 'rgba(170,190,222,' + (0.08 + breath * 0.15) + ')';
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(cx, cy, rr, 0, 6.2832); ctx.stroke();
    const bw = document.getElementById('breathword');
    if (bw){
      bw.textContent = breath > 0.5 ? 'В\u00a0Д\u00a0О\u00a0Х' : 'В\u00a0Ы\u00a0Д\u00a0О\u00a0Х';
      bw.style.color = 'rgba(201,168,76,' + (0.14 + breath * 0.3) + ')';
      bw.classList.add('show');
    }
  }

  // Искра — рождается в точке касания, расцветает и оседает в центр
  if (spark){
    const e = (ts - spark.t0) / 1000;
    const dur = 2.6;
    const k = Math.min(1, e / dur);
    const ease = k < 0.5 ? 2 * k * k : 1 - Math.pow(-2 * k + 2, 2) / 2;
    const x = spark.x + (cx - spark.x) * ease;
    const y = spark.y + (cy - spark.y) * ease;
    warmth = Math.min(1, k);
    const bloom = Math.sin(Math.min(k, 1) * Math.PI);
    const baseR = 6 + bloom * 24;
    const g = ctx.createRadialGradient(x, y, 0, x, y, baseR * 4);
    g.addColorStop(0, 'rgba(255,238,185,0.55)');
    g.addColorStop(0.4, 'rgba(255,202,95,0.22)');
    g.addColorStop(1, 'rgba(255,202,95,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, baseR * 4, 0, 6.2832); ctx.fill();
    ctx.fillStyle = 'rgba(255,249,225,0.95)';
    ctx.beginPath(); ctx.arc(x, y, Math.max(2, baseR * 0.42), 0, 6.2832); ctx.fill();
    if (k >= 1 && phase === 'spark'){
      phase = 'rest';
      setTimeout(function(){ setLine('afterword', true); }, 250);
      setTimeout(function(){ setLine('go', true); }, 2600);
    }
  }

  // Покой — оседающий уголёк дышит в центре
  if (phase === 'rest'){
    const sp = 0.5 + Math.sin(ft * 1.05) * 0.5;
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 96);
    g.addColorStop(0, 'rgba(255,222,145,' + (0.38 + sp * 0.22) + ')');
    g.addColorStop(1, 'rgba(255,202,95,0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, 96, 0, 6.2832); ctx.fill();
    ctx.fillStyle = 'rgba(255,250,232,' + (0.68 + sp * 0.22) + ')';
    ctx.beginPath(); ctx.arc(cx, cy, 7 + sp * 4, 0, 6.2832); ctx.fill();
  }

  requestAnimationFrame(draw);
}

// Касание тьмы → искра
function ignite(px, py){
  if (spark) return;
  if (phase === 'dark'){ phase = 'breath'; setLine('invite', true); } // если коснулся раньше времени
  spark = { x: px, y: py, t0: performance.now() };
  phase = 'spark';
  setLine('invite', false);
  setLine('breathword', false);
  try { localStorage.setItem('awara_istok_done', String(Date.now())); } catch (e) {}
}
canvas.addEventListener('pointerdown', function(e){ ignite(e.clientX, e.clientY); });

resize();
requestAnimationFrame(draw);
</script>
</body>
</html>
